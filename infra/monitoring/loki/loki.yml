# ==========================================================
# Loki — Log aggregation for OrangeCashMachine
# ==========================================================
#
# Modo: single-process (monolithic) — adecuado para desarrollo
# y producción de carga media. Escalar a microservices mode
# solo si el volumen de logs supera ~50GB/día.
#
# Retención: 30 días por defecto, configurable por stream.
# Storage: filesystem local — usar S3/GCS en producción distribuida.
# ==========================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

limits_config:
  # Retención global: 30 días
  retention_period: 720h
  # Ingesta máxima por stream
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # Evita logs muy antiguos rechazados
  reject_old_samples: true
  reject_old_samples_max_age: 168h

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

ruler:
  alertmanager_url: http://alertmanager:9093

analytics:
  reporting_enabled: false
