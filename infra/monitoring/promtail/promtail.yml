# infra/monitoring/promtail/promtail.yml
# =========================================
# Rutas DENTRO del container — el volume mount es:
#   host: ./logs  →  container: /logs  (read-only)
#
# Sinks activos (logger.py v0.2.0):
#   orangecashmachine_YYYY-MM-DD.log  — app completo (INFO+)
#   errors_YYYY-MM-DD.log             — WARNING+ solamente
#   pipeline_*.log                    — ELIMINADO en v0.2.0, ignorado

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ocm_app_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job:  ocm_app
          host: orangehouse
          env:  development
          __path__: /logs/orangecashmachine_*.log

  - job_name: ocm_error_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job:  ocm_errors
          host: orangehouse
          env:  development
          __path__: /logs/errors_*.log
