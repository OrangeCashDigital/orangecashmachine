# ==========================================================
# Promtail — Log shipper para OrangeCashMachine
# ==========================================================
#
# Recoge logs de:
#   1. Archivos locales del pipeline (./logs/) — todos los archivos *.log
#   2. Contenedores Docker via journal/json-file driver
#
# Labels mínimos garantizados en cada stream:
#   job, service, env, level (extraído del contenido cuando es JSON)
#
# Promtail corre en ocm_public para poder leer del host
# via bind mount de ./logs y del socket Docker.
# ==========================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    batchsize: 1048576   # 1MB
    batchwait: 1s

scrape_configs:

  # ── Pipeline logs (archivos locales) ───────────────────────────────
  - job_name: ocm_pipeline_files
    static_configs:
      - targets:
          - localhost
        labels:
          job:     ocm_pipeline
          service: orangecashmachine
          env:     "${OCM_ENV:-development}"
          __path__: /logs/*.log

    pipeline_stages:

      # Intentar parsear como JSON (system_*.log y pipeline_*.log)
      - json:
          expressions:
            level:   level
            event:   event
            run_id:  run_id
            exchange: exchange
            dataset:  dataset
            component: component

      # Si tiene campo 'level', usarlo como label
      - labels:
          level:    ""
          run_id:   ""
          exchange: ""
          dataset:  ""
          component: ""

      # Timestamp desde el JSON si existe
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05.000Z07:00"
            - "2006-01-02 15:04:05.000"

      # Extraer level de logs de texto plano (ocm_*.log, errors_*.log)
      - regex:
          expression: '^\S+ \| (?P<level_text>DEBUG|INFO|WARNING|ERROR|CRITICAL)\s+\|'
          source: message

      - template:
          source: level
          template: '{{ if .level }}{{ .level }}{{ else if .level_text }}{{ .level_text }}{{ end }}'

      - labeldrop:
          - level_text

  # ── Docker container logs ───────────────────────────────────────────
  - job_name: ocm_docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=orangecashmachine"]

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex:         "/(.*)"
        target_label:  container

      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label:  service

      - source_labels: [__meta_docker_container_label_ocm_env]
        target_label:  env

      - source_labels: [__meta_docker_container_id]
        target_label:  __path__
        replacement:   /var/lib/docker/containers/$1/$1-json.log

    pipeline_stages:
      - json:
          expressions:
            log:    log
            stream: stream
            time:   time

      - labels:
          stream: ""

      - timestamp:
          source: time
          format: RFC3339Nano
