# ==========================================================
# Grafana datasource — Loki
# ==========================================================
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      # Correlación con Prometheus: enlaza trazas de logs con métricas
      derivedFields:
        - name:          run_id
          matcherRegex:  '"run_id":"([^"]+)"'
          url:           '/explore?left={"datasource":"Prometheus","queries":[{"expr":"ocm_log_events_total{run_id=\"$${__value.raw}\"}"}]}'
          urlDisplayLabel: "Ver métricas de este run"
