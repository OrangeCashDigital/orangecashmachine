# ==========================================================
# Prometheus — OrangeCashMachine
# ==========================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "prefect-server"
    static_configs:
      - targets: ["prefect-server:4200"]

  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  # ── Loki — métricas internas del servidor de logs ─────────────────
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  # ── Promtail — métricas del agente de recolección ─────────────────
  - job_name: "promtail"
    static_configs:
      - targets: ["promtail:9080"]
