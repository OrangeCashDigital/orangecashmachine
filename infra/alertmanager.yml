global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "exchange"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - matchers:
        - severity = "critical"
      group_wait: 0s
      repeat_interval: 1h
      receiver: "default"

receivers:
  - name: "default"
    # ⚠️  CONFIGURAR RECEPTOR ANTES DE PRODUCCIÓN
