# alerts.yml
groups:

  - name: ocm_pipeline
    interval: 1m
    rules:

      - alert: PipelineStalled
        expr: |
          (time() - ocm_pipeline_last_run_timestamp) > 7200
        for: 5m
        labels:
          severity: critical
          team: data
        annotations:
          summary: "Pipeline detenido | exchange={{ $labels.exchange }}"
          description: >
            El pipeline de {{ $labels.exchange }} no ha completado un run
            en más de 2 horas. Los datos para trading pueden estar desactualizados.
            Verificar: Prefect UI (localhost:4200), logs del worker, estado de Redis.

      - alert: PipelineHeartbeatDead
        expr: |
          increase(ocm_pipeline_heartbeat_total[3h]) == 0
        for: 5m
        labels:
          severity: critical
          team: data
        annotations:
          summary: "Heartbeat detenido | exchange={{ $labels.exchange }}"
          description: >
            El pipeline de {{ $labels.exchange }} no ha incrementado su heartbeat
            en 3 horas. Verificar que el pipeline esté corriendo y que el
            Pushgateway (localhost:9091) esté accesible.

      - alert: HighPipelineErrorRate
        expr: |
          (
            rate(ocm_pipeline_errors_total[15m])
            /
            (rate(ocm_pipeline_errors_total[15m]) + rate(ocm_pipeline_rows_ingested_total[15m]) + 0.001)
            > 0.10
          )
          and
          rate(ocm_pipeline_rows_ingested_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "Tasa de errores alta | exchange={{ $labels.exchange }}"
          description: >
            Más del 10% de las operaciones están fallando en {{ $labels.exchange }}.
            Verificar conectividad con el exchange y rate limits.

      - alert: WritelockHighContention
        expr: |
          histogram_quantile(0.95, rate(ocm_write_lock_wait_seconds_bucket[10m])) > 5
        for: 3m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "Write lock con alta contención | exchange={{ $labels.exchange }}"
          description: >
            El percentil 95 de espera del write lock supera 5 segundos en
            {{ $labels.exchange }}/{{ $labels.symbol }}/{{ $labels.timeframe }}.
            Considerar reducir max_concurrency en el pipeline.

      - alert: PartitionChecksumFailure
        expr: |
          increase(ocm_manifest_checksum_failures_total[1h]) > 0
        for: 0m
        labels:
          severity: critical
          team: data
        annotations:
          summary: "Partición corrupta | {{ $labels.exchange }}/{{ $labels.symbol }}"
          description: >
            Se detectó al menos una partición con checksum inválido en
            {{ $labels.exchange }}/{{ $labels.symbol }}/{{ $labels.timeframe }}.
            Ejecutar modo repair para reconstruir la partición afectada.

  - name: ocm_exchange
    interval: 1m
    rules:

      - alert: ExchangeHighLatency
        expr: |
          histogram_quantile(0.95, rate(ocm_exchange_latency_ms_bucket[10m])) > 3000
        for: 5m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "Exchange con alta latencia | {{ $labels.exchange }}"
          description: >
            El percentil 95 de latencia de {{ $labels.exchange }} supera 3000ms.
            El pipeline puede estar en riesgo de timeout. Verificar conectividad
            o aumentar el rate limit configurado.

      - alert: ExchangeClockDriftHigh
        expr: |
          abs(ocm_exchange_clock_drift_ms) > 300000
        for: 10m
        labels:
          severity: warning
          team: data
        annotations:
          summary: "Clock drift alto | {{ $labels.exchange }}"
          description: >
            El drift de reloj de {{ $labels.exchange }} supera 5 minutos.
            Los timestamps de las velas pueden ser incorrectos.
            Verificar sincronización NTP y validar datos recientes.
