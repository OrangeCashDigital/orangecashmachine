# infra/monitoring/prometheus.yml
# ================================
# Configuración de scrape de Prometheus para OrangeCashMachine.
#
# Jobs activos:
#   prometheus  — self-scrape del servidor Prometheus
#   pushgateway — métricas push de workers sin servidor HTTP propio
#   dagster     — métricas del webserver Dagster (puerto 3000)
#
# Jobs eliminados:
#   prefect     — servicio eliminado en v0.3. Ver _legacy/prefect_orchestration/.
#
# SSOT: los targets deben coincidir con los service names de docker-compose.yml.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ocm'

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  - job_name: 'dagster'
    static_configs:
      - targets: ['dagster:3000']
    metrics_path: /metrics
    scrape_interval: 30s
