# conf/market_data/feeds.yaml
# ────────────────────────────────────────────────────────────────
# Event-driven WebSocket feed configuration.
#
# ingestion_mode migration path:
#   rest      → Phase 1: legacy REST only  (default, safe)
#   dual      → Phase 2: both run, validate parity in Grafana
#   websocket → Phase 3: WebSocket only, REST idle
# ────────────────────────────────────────────────────────────────

ingestion_mode: rest   # ← change to 'dual' when ready for Phase 2

kafka:
  topic_trades: market.trades.raw

feeds:
  bybit:
    enabled: true
    symbols:
      - BTC-USDT-PERP
      - ETH-USDT-PERP
      - SOL-USDT-PERP

  kucoin:
    enabled: false        # enable when KuCoin REST is also ready to retire
    symbols:
      - BTC-USDT
      - ETH-USDT
