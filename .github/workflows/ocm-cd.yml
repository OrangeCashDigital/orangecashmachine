name: OrangeCashMachine CD

on:
  workflow_run:
    workflows: ["OrangeCashMachine CI"]
    types:
      - completed

concurrency:
  group: ocm-deploy
  cancel-in-progress: false

jobs:

  deploy:

    name: Deploy Trading Stack

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:

      # -------------------------------------------------
      # Deploy via SSH
      # -------------------------------------------------

      - name: Deploy to trading server
        uses: appleboy/ssh-action@v1

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          script_stop: true

          script: |

            set -e

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 OrangeCashMachine Deploy"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            REPO_DIR="/home/orangemusic/trading/orangecashmachine"

            echo "📂 Switching to repo directory"

            if [ ! -d "$REPO_DIR/.git" ]; then
                echo "❌ Repository not found"
                exit 1
            fi

            cd "$REPO_DIR"

            echo "📦 Updating repository"

            git fetch origin main
            git reset --hard origin/main

            echo "⚙️ Running deploy script"

            chmod +x deploy_ocm.sh
            ./deploy_ocm.sh production

            echo ""
            echo "📊 Container status"

            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "✅ Deploy completed successfully"