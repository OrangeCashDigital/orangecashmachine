name: orangecashmachine - CI

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t orangecashmachine .

      - name: Test freqtrade
        run: |
          docker run --rm orangecashmachine freqtrade --version