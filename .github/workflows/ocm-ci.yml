name: OrangeCashMachine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Un solo runner por ref — cancela runs anteriores del mismo PR para ahorrar minutos.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint de arquitectura
  # REGLA: un contrato BROKEN = merge bloqueado. Fail-fast sin excepciones.
  # Comando correcto: uv run lint-imports (import-linter 2.x no tiene __main__.py)
  # Documentación: https://import-linter.readthedocs.io
  # ──────────────────────────────────────────────────────────────────────────
  architecture:
    name: Architecture contracts (import-linter)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Check architecture contracts
        run: uv run lint-imports --config architecture/importlinter.toml

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Tests
  # Depende de architecture — si los contratos están rotos, no corremos tests.
  # Fail-fast: -x detiene en el primer fallo para feedback rápido.
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: architecture

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -x -q

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Validación de config
  # Separado de tests — valida que Hydra/OmegaConf arranca sin errores.
  # No depende de architecture directamente (puede correr en paralelo con tests).
  # ──────────────────────────────────────────────────────────────────────────
  config-validation:
    name: Config validation (Hydra bootstrap)
    runs-on: ubuntu-latest
    needs: architecture

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Validate config
        run: OCM_VALIDATE_ONLY=1 uv run python main.py
