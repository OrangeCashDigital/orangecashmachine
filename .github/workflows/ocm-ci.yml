name: OrangeCashMachine CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:

  test-bots:

    name: Test Trading Bots
    runs-on: ubuntu-latest

    env:
      COMPOSE_FILE: docker-compose.test.yml

    steps:

      # -------------------------------------------------
      # Checkout
      # -------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4


      # -------------------------------------------------
      # Docker build system
      # -------------------------------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # -------------------------------------------------
      # Validar estructura del proyecto
      # -------------------------------------------------

      - name: Validate project structure
        run: |
          echo "Validating project structure..."

          test -d BOTS || (echo "❌ BOTS directory missing" && exit 1)


      # -------------------------------------------------
      # Validar estrategias Python
      # -------------------------------------------------

      - name: Validate Python strategies
        run: |
          echo "Checking Python syntax..."

          find BOTS -name "*.py" -print0 | while IFS= read -r -d '' file; do
              python -m py_compile "$file"
          done


      # -------------------------------------------------
      # Validar archivos config.json
      # -------------------------------------------------

      - name: Validate freqtrade configs
        run: |
          echo "Validating config.json files..."

          find BOTS -name "config.json" -print0 | while IFS= read -r -d '' file; do
              python -m json.tool "$file" > /dev/null
          done


      # -------------------------------------------------
      # Build contenedores
      # -------------------------------------------------

      - name: Build docker images
        run: |
          echo "Building containers..."

          docker compose build


      # -------------------------------------------------
      # Ejecutar test containers
      # -------------------------------------------------

      - name: Run bot tests
        run: |
          echo "Running bot containers..."

          docker compose up --abort-on-container-exit


      # -------------------------------------------------
      # Cleanup
      # -------------------------------------------------

      - name: Cleanup containers
        if: always()
        run: |
          docker compose down -v