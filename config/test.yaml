# ==============================================================================
# OrangeCashMachine – Test Configuration (CI / Validation)
# ==============================================================================

# ------------------------------------------------------------------------------
# Propósito
# ------------------------------------------------------------------------------
# Entorno de testing automatizado.
#
# Se aplica como:
#   base.yaml → test.yaml
#
# Objetivos:
# • reproducibilidad total
# • ejecución rápida
# • aislamiento completo
# • cero efectos secundarios
# ------------------------------------------------------------------------------

# ==============================================================================
# ENVIRONMENT
# ==============================================================================
environment:
  name: test
  debug: false

# ==============================================================================
# PIPELINE (Determinista y rápido)
# ==============================================================================
pipeline:

  historical:
    # Serial → reproducible (sin condiciones de carrera)
    max_concurrent_tasks: 1

    # Nunca descargar historia completa en tests
    backfill_mode: false

    # Reducir timeframes para acelerar tests
    timeframes: [1m]

  realtime:
    # Desactivado o mínimo para tests
    max_stream_buffer: 100
    snapshot_interval_seconds: 5

# ==============================================================================
# OBSERVABILITY (mínima pero útil)
# ==============================================================================
observability:

  logging:
    level: WARNING
    format: json

  metrics:
    enabled: false

# ==============================================================================
# STORAGE (aislado y efímero)
# ==============================================================================
storage:

  data_lake:
    path: ${TEST_DATA_LAKE_PATH:-data_platform/test_data_lake}


# ==============================================================================
# INTEGRATIONS (mock-friendly)
# ==============================================================================
integrations:

  redis:
    enabled: ${REDIS_ENABLED:-false}
    host: ${REDIS_HOST:-localhost}
    port: ${REDIS_PORT:-6379}
    db: 2  # DB separada para tests

  kafka:
    enabled: false

  postgres:
    enabled: false

# ==============================================================================
# SAFETY GUARDS (máximos)
# ==============================================================================
safety:

  prevent_full_reingestion: true
  require_explicit_start: false

# ==============================================================================
# TEST FLAGS
# ==============================================================================
testing:

  # Limitar número de símbolos para acelerar
  limit_symbols: 1

  # Usar datos mock si está disponible
  use_mock_data: true

  # Forzar determinismo en pipelines
  deterministic_mode: true