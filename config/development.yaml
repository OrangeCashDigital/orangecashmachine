# ==============================================================================
# OrangeCashMachine – Development Configuration (Debug-Friendly)
# ==============================================================================

# ------------------------------------------------------------------------------
# Propósito
# ------------------------------------------------------------------------------
# Overrides para desarrollo local.
#
# Se aplica como:
#   base.yaml → development.yaml
#
# Objetivos:
# • debugging fácil
# • iteración rápida
# • bajo consumo de recursos
# • comportamiento cercano a producción (sin riesgos)
# ------------------------------------------------------------------------------

# ==============================================================================
# ENVIRONMENT
# ==============================================================================
environment:
  name: development
  debug: true

# ==============================================================================
# PIPELINE (Optimizado para desarrollo)
# ==============================================================================
pipeline:

  historical:
    # Baja concurrencia → logs legibles + debugging controlado
    max_concurrent_tasks: 2

  realtime:
    # Feedback rápido en local
    snapshot_interval_seconds: 10
    max_stream_buffer: 1000

# ==============================================================================
# OBSERVABILITY (Debug-first)
# ==============================================================================
observability:

  logging:
    level: DEBUG
    format: console
    log_dir: logs
    rotation: 1 day
    retention: 7 days
    console: true
    file: true
    pipeline: true

  metrics:
    enabled: true

# ==============================================================================
# STORAGE (Aislado de producción)
# ==============================================================================
storage:

  data_lake:
    path: ${DEV_DATA_LAKE_PATH:-data_platform/dev_data_lake}

  feature_store:
    path: ${DEV_FEATURE_STORE_PATH:-data_platform/dev_features}

# ==============================================================================
# INTEGRATIONS (Simples pero realistas)
# ==============================================================================
integrations:

  # --------------------------------------------------------
  # Redis (activo para probar cursor real)
  # --------------------------------------------------------
  redis:
    enabled: ${REDIS_ENABLED:-true}
    host: ${REDIS_HOST:-localhost}
    port: ${REDIS_PORT:-6379}
    db: ${REDIS_DB:-1}   # DB separada para no contaminar

  # --------------------------------------------------------
  # Kafka (desactivado en dev por simplicidad)
  # --------------------------------------------------------
  kafka:
    enabled: false

  # --------------------------------------------------------
  # PostgreSQL (opcional en dev)
  # --------------------------------------------------------
  postgres:
    enabled: false

# ==============================================================================
# SAFETY GUARDS (críticos incluso en dev)
# ==============================================================================
safety:

  # Nunca reingestar todo accidentalmente
  prevent_full_reingestion: true

  # Permite ejecución sin confirmación (dev-friendly)
  require_explicit_start: false