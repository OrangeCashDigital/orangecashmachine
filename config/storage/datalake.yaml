# @package _global_
# ==============================================================================
# OrangeCashMachine — Storage: Data Lake path anchor
# ==============================================================================
# SSOT del path base del data platform.
#
# paths.py resuelve desde aquí:
#   iceberg_warehouse/ → data_lake_root().parent / "iceberg_warehouse"
#   iceberg_catalog/   → data_lake_root().parent / "iceberg_catalog"
#
# REGLA: sin default en la interpolación.
# Si OCM_DATA_LAKE_PATH no está seteado → OmegaConf lanza error explícito.
# Esto previene split-brain silencioso (escribir en A, leer desde B).
#
# Setear en .env (dev) o como variable de entorno del sistema (prod):
#   OCM_DATA_LAKE_PATH=data_platform/data_lake          # dev
#   OCM_DATA_LAKE_PATH=/var/lib/ocm/data_lake           # prod
# ==============================================================================

storage:
  data_lake:
    path: ${oc.env:OCM_DATA_LAKE_PATH}
