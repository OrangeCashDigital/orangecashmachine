# @package _global_
# ==============================================================================
# OrangeCashMachine — Storage: Data Lake
# ==============================================================================
# Define CÓMO se almacenan los datos. No define qué datos se capturan.
# ==============================================================================

storage:
  data_lake:
    path: ${oc.env:DATA_LAKE_PATH,data_platform/data_lake}
    format: parquet
    compression: snappy
    partitioning:
      - exchange
      - symbol
      - timeframe
      - year
      - month
