# @package _global_
# ==============================================================================
# OrangeCashMachine — Risk Management
# ==============================================================================
# Parámetros de gestión de riesgo. Solo usados cuando execution está activo.
# En fase data pipeline, estos valores son referencia — no se aplican en runtime.
# ==============================================================================

risk:
  position:
    max_position_pct: 0.05       # max 5% del capital por posición
    max_open_positions: 3

  stop_loss:
    enabled: true
    default_pct: 0.02            # 2% stop-loss por defecto

  drawdown:
    max_daily_drawdown_pct: 0.05
    max_total_drawdown_pct: 0.15
    halt_on_breach: true

  order:
    min_order_usd: 10
    max_order_usd: 1000
