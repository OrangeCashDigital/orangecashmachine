# ==============================================================================
# OrangeCashMachine – Base Configuration (Production-Ready)
# ==============================================================================

# ==============================================================================
# ENVIRONMENT METADATA
# ==============================================================================
environment:
  name: base
  version: 1.1.0
  last_modified_by: orangemusic
  last_modified_at: 2026-03-18T00:00:00Z

# ==============================================================================
# PIPELINES
# ==============================================================================
pipeline:
  historical:
    start_date: "2017-01-01T00:00:00Z"
    backfill_mode: true

    # Auto → resuelto dinámicamente en runtime (CPU-bound safe default)
    max_concurrent_tasks: auto

    retry_policy:
      max_attempts: 5
      backoff_factor: 2
      jitter: true

    timeframes: [1m, 5m, 15m, 1h, 4h, 1d]

  realtime:
    reconnect_delay_seconds: 5
    heartbeat_timeout_seconds: 30
    snapshot_interval_seconds: 60
    max_stream_buffer: 50000
    drop_policy: reject

# ==============================================================================
# DATASETS
# ==============================================================================
datasets:
  ohlcv: true
  trades: false
  orderbook: false
  funding_rate: false
  open_interest: false
  liquidations: false
  mark_price: false
  index_price: false

# ==============================================================================
# EXCHANGES
# ==============================================================================
exchanges:
  bybit:
    enabled: true
    enableRateLimit: true
    auto_discover_symbols: false

    credentials:
      apiKey: ${BYBIT_API_KEY}
      secret: ${BYBIT_API_SECRET}

    options:
      adjustForTimeDifference: true

    markets:
      spot:
        enabled: true
        symbols: [BTC/USDT]

      futures:
        enabled: true
        defaultType: swap
        symbols:
          - BTC/USDT:USDT   # linear perpetual USDT-margined
          - BTC/USD:BTC     # inverse perpetual coin-margined

  kucoin:
    enabled: true
    enableRateLimit: true
    auto_discover_symbols: false

    credentials:
      apiKey: ${KUCOIN_API_KEY}
      secret: ${KUCOIN_API_SECRET}
      password: ${KUCOIN_PASSPHRASE}

    options:
      adjustForTimeDifference: true

    markets:
      spot:
        enabled: true
        symbols: [BTC/USDT]

      futures:
        enabled: false   # kucoin (ccxt) = spot only — derivados via kucoinfutures

  kucoinfutures:
    enabled: true
    enableRateLimit: true
    auto_discover_symbols: false

    credentials:
      apiKey: ${KUCOIN_API_KEY}
      secret: ${KUCOIN_API_SECRET}
      password: ${KUCOIN_PASSPHRASE}

    options:
      adjustForTimeDifference: true
      defaultType: swap

    markets:
      spot:
        enabled: false
        symbols: []

      futures:
        enabled: true
        defaultType: swap
        symbols:
          - BTC/USDT:USDT   # linear perpetual USDT-margined

# ==============================================================================
# STORAGE (Data Platform)
# ==============================================================================
storage:
  data_lake:
    path: ${DATA_LAKE_PATH:-data_platform/data_lake}
    format: parquet
    compression: snappy

    partitioning:
      - exchange
      - symbol
      - timeframe
      - year
      - month

# ==============================================================================
# FEATURE STORE
# ==============================================================================

# ==============================================================================
# OBSERVABILITY
# ==============================================================================
observability:
  logging:
    level: ${LOG_LEVEL:-INFO}
    format: json

  metrics:
    enabled: true
    exporter: prometheus
    port: ${METRICS_PORT:-8000}

  tracing:
    enabled: false

# ==============================================================================
# INFRASTRUCTURE INTEGRATIONS
# ==============================================================================
integrations:

  # --------------------------------------------------------
  # Redis (Cursor Store / Cache)
  # --------------------------------------------------------
  redis:
    enabled: ${REDIS_ENABLED:-true}
    host: ${REDIS_HOST:-localhost}
    port: ${REDIS_PORT:-6379}
    db: ${REDIS_DB:-0}

    # SafeOps
    socket_timeout: 5
    retry_on_timeout: true

  # --------------------------------------------------------
  # Kafka (streaming future-ready)
  # --------------------------------------------------------
  kafka:
    enabled: false
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}

  # --------------------------------------------------------
  # Postgres (metadata / analytics future)
  # --------------------------------------------------------
  postgres:
    enabled: false
    host: ${POSTGRES_HOST:-localhost}
    port: ${POSTGRES_PORT:-5432}
    user: ${POSTGRES_USER:-}
    password: ${POSTGRES_PASSWORD:-}

# ==============================================================================
# HEALTH CHECKS
# ==============================================================================
healthchecks:
  enabled: true

  checks:
    - storage
    - exchanges
    - redis