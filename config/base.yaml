# ==============================================================================
# OrangeCashMachine – Configuración Base de Infraestructura (Versión Controlada)
# ==============================================================================
#
# Este archivo define la CONFIGURACIÓN BASE del sistema.
# Todas las configuraciones específicas de entorno deben definirse en:
#
#   development.yaml
#   production.yaml
#
# El loader del sistema combinará automáticamente:
#
#   base.yaml + <env>.yaml + settings.yaml
#
# Arquitectura del sistema
# ------------------------------------------------------------------------------
# Exchanges → Adquisición de Datos → Plataforma de Datos → Research / Trading
#
# Principios de ingeniería aplicados
# ------------------------------------------------------------------------------
# SOLID   → Componentes modulares y extensibles
# KISS    → Configuración simple y predecible
# DRY     → Evitar duplicación de configuración
# SafeOps → Operación segura y resiliente
#
# Política de seguridad
# ------------------------------------------------------------------------------
# - Nunca almacenar credenciales directamente en este archivo
# - Utilizar variables de entorno (.env)
# - Rotar claves de API periódicamente
#
# Trazabilidad / Control de versiones
# ------------------------------------------------------------------------------
# version           → Número de versión de la configuración (SemVer)
# last_modified_by  → Usuario o sistema que realizó el último cambio
# last_modified_at  → Timestamp ISO8601 del último cambio
# hash_sha256       → Calculado dinámicamente al cargar para detectar cambios
# ==============================================================================

# ==============================================================================
# METADATOS DE ENTORNO
# ==============================================================================
environment:
  name: base
  version: 1.0.0
  last_modified_by: orangemusic
  last_modified_at: 2026-03-17T18:52:26Z

# ==============================================================================
# CONFIGURACIÓN DE PIPELINES
# ==============================================================================
pipeline:
  historical:
    start_date: "2017-01-01T00:00:00Z"
    fetch_all_history: true
    max_concurrent_tasks: auto
    retry_policy:
      max_attempts: 5
      backoff_factor: 2
      jitter: true
    timeframes:
      - 1m
      - 5m
      - 15m
      - 1h
      - 4h
      - 1d

  realtime:
    reconnect_delay_seconds: 5
    heartbeat_timeout_seconds: 30
    snapshot_interval_seconds: 60
    max_stream_buffer: 50000
    drop_policy: reject

# ==============================================================================
# DATASETS DISPONIBLES
# ==============================================================================
datasets:
  ohlcv: true
  trades: false
  orderbook: false
  funding_rate: false
  open_interest: false
  liquidations: false
  mark_price: false
  index_price: false

# ==============================================================================
# CONFIGURACIÓN DE EXCHANGES
# ==============================================================================
exchanges:
  bybit:
    enabled: true
    enableRateLimit: true
    auto_discover_symbols: false
    credentials:
      apiKey: ${BYBIT_API_KEY}
      secret: ${BYBIT_API_SECRET}
    options:
      adjustForTimeDifference: true
    markets:
      spot:
        enabled: true
        symbols:
          - BTC/USDT
      futures:
        enabled: false
        defaultType: swap
        symbols:
          - BTC/USDT

  kucoin:
    enabled: true
    enableRateLimit: true
    auto_discover_symbols: false
    credentials:
      apiKey: ${KUCOIN_API_KEY}
      secret: ${KUCOIN_API_SECRET}
      password: ${KUCOIN_PASSPHRASE}
    options:
      adjustForTimeDifference: true
    markets:
      spot:
        enabled: true
        symbols:
          - BTC/USDT
      futures:
        enabled: false
        defaultType: swap
        symbols:
          - BTC/USDT

# ==============================================================================
# ALMACENAMIENTO – DATA PLATFORM
# ==============================================================================
storage:
  data_lake:
    path: "data_platform/data_lake"
    format: parquet
    compression: snappy
    partitioning:
      - exchange
      - symbol
      - timeframe
      - year
      - month

# ==============================================================================
# FEATURE STORE
# ==============================================================================
feature_store:
  enabled: true
  path: "data_platform/features"
  format: parquet

# ==============================================================================
# OBSERVABILIDAD
# ==============================================================================
observability:
  logging:
    level: INFO
    format: json
  metrics:
    enabled: true
    exporter: prometheus
  tracing:
    enabled: false

# ==============================================================================
# INTEGRACIONES DE INFRAESTRUCTURA
# ==============================================================================
integrations:
  redis:
    enabled: false
    host: localhost
    port: 6379
  kafka:
    enabled: false
    bootstrap_servers: localhost:9092
  postgres:
    enabled: false
    host: localhost
    port: 5432
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

# ==============================================================================
# HEALTH CHECKS
# ==============================================================================
healthchecks:
  enabled: true
  checks:
    - storage
    - exchanges