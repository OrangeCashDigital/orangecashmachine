# ==============================================================================
# OrangeCashMachine — Base Configuration
# ==============================================================================
# Solo: metadata, integrations de infraestructura, healthchecks, safety global.
# Todo lo modular está en pipeline/, exchanges/, storage/, observability/, risk/
#
# ADVERTENCIA DE SEGURIDAD:
#   ‘uv run python main.py --cfg job --resolve’ expone secretos en claro en stdout
#   porque opera sobre el DictConfig de Hydra ANTES de la capa Pydantic/SecretStr.
#   NUNCA ejecutar en producción ni redirigir su output a logs persistentes.
#   Para inspección segura usar: ‘uv run python -c "from core.config.hydra_loader
#   import load_appconfig_standalone; c=load_appconfig_standalone(); print(c)"’
# ==============================================================================

environment:
  name: base
  debug: false
  version: 1.1.0
  last_modified_by: orangemusic
  last_modified_at: 2026-04-06T00:00:00Z

# ==============================================================================
# SAFETY (defaults seguros globales)
# ==============================================================================
safety:
  dry_run: true                    # SAFE DEFAULT — producción lo sobrescribe explícitamente
  prevent_full_reingestion: false
  require_explicit_start: false
  max_backfill_days: 90            # límite de backfill por ejecución — evita reingesta masiva accidental
  require_confirmation: false      # true en prod → requiere flag explícito en CLI antes de operar

# ==============================================================================
# INTEGRATIONS
# ==============================================================================
integrations:
  redis:
    enabled: ${oc.env:REDIS_ENABLED,true}
    host: ${oc.env:REDIS_HOST,localhost}
    port: ${oc.env:REDIS_PORT,6379}
    db: ${oc.env:REDIS_DB,1}    # 1 = canónico dev. Setear REDIS_DB en .env.
    socket_timeout: 5
    retry_on_timeout: true

  kafka:
    enabled: false
    bootstrap_servers: ${oc.env:KAFKA_BOOTSTRAP_SERVERS,localhost:9092}

  postgres:
    enabled: false
    host: ${oc.env:POSTGRES_HOST,localhost}
    port: ${oc.env:POSTGRES_PORT,5432}
    user: ${oc.env:POSTGRES_USER,""}
    password: ${oc.env:POSTGRES_PASSWORD,""}

# ==============================================================================
# HEALTH CHECKS
# ==============================================================================
healthchecks:
  enabled: true
  checks:
    - storage
    - exchanges
    - redis
