# ==============================================================================
# OrangeCashMachine – Configuración de Overrides Opcional
# ==============================================================================
#
# Este archivo se utiliza para ajustes locales, temporales o experimentales.
# Siempre se mergea como última capa: base.yaml → <env>.yaml → settings.yaml
#
# No se deben colocar credenciales sensibles aquí.
# ==============================================================================
#
# NOTA:
# - Se puede usar en desarrollo, staging o pruebas.
# - Puede contener overrides de pipelines, logging, storage, integraciones, etc.
# ==============================================================================

# ==============================================================================
# ENVIRONMENT METADATA
# ==============================================================================
environment:
  # Este nombre no sobrescribe <env>.yaml; sirve solo para tracking opcional
  name: local-overrides

# ==============================================================================
# PIPELINE OVERRIDES
# ==============================================================================
pipeline:
  historical:
    # Ajuste temporal para debugging
    max_concurrent_tasks: 1
    fetch_all_history: false

  realtime:
    # Debugging: disminuir buffer de stream
    max_stream_buffer: 1000
    snapshot_interval_seconds: 10

# ==============================================================================
# OBSERVABILIDAD / LOGGING
# ==============================================================================
observability:
  logging:
    level: DEBUG
    format: json

# ==============================================================================
# STORAGE OVERRIDES
# ==============================================================================
storage:
  data_lake:
    path: "data_platform/local_data_lake"
  feature_store:
    path: "data_platform/local_features"

# ==============================================================================
# EXPERIMENTAL / FEATURE FLAGS
# ==============================================================================
features:
  enable_new_strategy: true
  enable_risk_simulator: false

# ==============================================================================
# INTEGRACIONES TEMPORALES
# ==============================================================================
integrations:
  redis:
    enabled: true
    host: localhost
    port: 6379

  kafka:
    enabled: false

  postgres:
    enabled: false