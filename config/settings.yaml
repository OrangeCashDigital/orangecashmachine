# ===============================================================
# OrangeCashMachine – Market Data Infrastructure Configuration
# ===============================================================
#
# Configuración central del sistema de datos de mercado.
# Arquitectura:
# Exchange APIs → Data Acquisition → Data Platform → Feature Engineering → Research / Trading
#
# Principios de ingeniería aplicados: SOLID, KISS, DRY, SafeOps
# Seguridad: nunca almacenar API keys reales; usar variables de entorno
# ===============================================================

# ===============================================================
# PIPELINE CONFIGURATION
# ===============================================================
pipeline:

  # -------------------------------------------------------------
  # HISTORICAL DATA PIPELINE
  # -------------------------------------------------------------
  historical:
    # Fecha inicial para descargas históricas
    start_date: "2017-01-01T00:00:00Z"

    # Descarga completa desde el inicio de datos (ignora último timestamp guardado)
    fetch_all_history: false

    # Concurrencia paralela
    max_concurrent_tasks: 6

    # Política de reintentos ante fallos de red o API
    retry_policy:
      max_attempts: 5
      backoff_factor: 2
      jitter: true

    # Timeframes requeridos por estrategias o ML
    timeframes:
      - 1m
      - 5m
      - 15m
      - 1h
      - 4h
      - 1d

  # -------------------------------------------------------------
  # REALTIME DATA PIPELINE
  # -------------------------------------------------------------
  realtime:
    reconnect_delay_seconds: 5
    heartbeat_timeout_seconds: 30
    snapshot_interval_seconds: 60
    max_stream_buffer: 50000

# ===============================================================
# DATASETS CONFIGURATION
# ===============================================================
datasets:
  # Core market data
  ohlcv: true
  trades: true
  orderbook: false  # recomendado solo en realtime

  # Derivatives / Advanced data
  funding_rate: true
  open_interest: true
  liquidations: true
  mark_price: true
  index_price: true

# ===============================================================
# EXCHANGE CONFIGURATION
# ===============================================================
exchanges:

  bybit:
    enabled: true
    enableRateLimit: true
    credentials:
      apiKey: ${BYBIT_API_KEY}
      secret: ${BYBIT_API_SECRET}
    options:
      adjustForTimeDifference: true
    markets:
      spot:
        enabled: true
        symbols:
          - BTC/USDT
      futures:
        enabled: true
        defaultType: swap
        symbols:
          - BTC/USDT

  kucoin:
    enabled: true
    enableRateLimit: true
    credentials:
      apiKey: ${KUCOIN_API_KEY}
      secret: ${KUCOIN_API_SECRET}
    options:
      adjustForTimeDifference: true
    markets:
      spot:
        enabled: true
        symbols:
          - BTC/USDT
      futures:
        enabled: true
        defaultType: swap
        symbols:
          - BTC/USDT

# ===============================================================
# DATA PLATFORM CONFIGURATION
# ===============================================================
storage:
  data_lake_path: "data_platform/data_lake"
  format: parquet
  compression: snappy

  partitioning:  # Optimizado para analytics y ML
    - exchange
    - market
    - symbol
    - dataset
    - timeframe
    - year
    - month

# ===============================================================
# OPTIONAL INFRASTRUCTURE INTEGRATIONS
# ===============================================================
integrations:

  redis:
    enabled: false
    host: localhost
    port: 6379

  kafka:
    enabled: false
    bootstrap_servers: localhost:9092

  postgres:
    enabled: false
    host: localhost
    port: 5432
    user: user
    password: password