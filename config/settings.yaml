# ==============================================================================
# OrangeCashMachine – Settings Overrides (Local / Debug / Experimental)
# ==============================================================================

# ------------------------------------------------------------------------------
# Propósito
# ------------------------------------------------------------------------------
# Overrides finales del sistema.
# Orden de carga:
#   base.yaml → <env>.yaml → settings.yaml
#
# Uso típico:
# • debugging local
# • experimentación
# • tuning temporal
#
# REGLAS:
# • No credenciales sensibles
# • No hardcode de infraestructura
# • Todo debe ser reversible
# ------------------------------------------------------------------------------

# ==============================================================================
# ENVIRONMENT METADATA (tracking no funcional)
# ==============================================================================
environment:
  name: local-overrides
  debug: true

# ==============================================================================
# PIPELINE (Overrides controlados)
# ==============================================================================
pipeline:

  historical:
    # Debug mode → baja concurrencia para trazabilidad
    max_concurrent_tasks: 1

    # Evita descargas masivas accidentales en local
    fetch_all_history: false

  realtime:
    # Reduce uso de memoria en local
    max_stream_buffer: 1000

    # Feedback más rápido en testing
    snapshot_interval_seconds: 10

# ==============================================================================
# OBSERVABILITY (Debug-first)
# ==============================================================================
observability:

  logging:
    level: DEBUG
    format: json

  metrics:
    enabled: true

# ==============================================================================
# STORAGE (Aislamiento local)
# ==============================================================================
storage:

  data_lake:
    # Path aislado para no contaminar producción
    path: ${LOCAL_DATA_LAKE_PATH:-data_platform/local_data_lake}

  feature_store:
    path: ${LOCAL_FEATURE_STORE_PATH:-data_platform/local_features}

# ==============================================================================
# FEATURE FLAGS (Experimental control)
# ==============================================================================
features:

  enable_new_strategy: true
  enable_risk_simulator: false

# ==============================================================================
# INTEGRATIONS (NO acoplar a infraestructura)
# ==============================================================================
integrations:

  redis:
    enabled: true
    host: ${REDIS_HOST:-localhost}
    port: ${REDIS_PORT:-6379}

  kafka:
    enabled: false

  postgres:
    enabled: false