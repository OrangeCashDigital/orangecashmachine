# ===============================================================
# OrangeCashMachine – Market Data Infrastructure Configuration
# ===============================================================
#
# Arquitectura:
#   Exchange APIs → Data Acquisition → Data Platform → Research / Trading
#
# Principios: SOLID, KISS, DRY, SafeOps
# Seguridad: nunca almacenar credenciales aquí — usar variables de entorno
# Credenciales: definir en .env en la raíz del proyecto
# ===============================================================

# ===============================================================
# PIPELINE
# ===============================================================
pipeline:

  historical:
    start_date: "2017-01-01T00:00:00Z"
    fetch_all_history: false
    max_concurrent_tasks: 6

    retry_policy:
      max_attempts: 5
      backoff_factor: 2
      jitter: true

    timeframes:
      - 1m
      - 5m
      - 15m
      - 1h
      - 4h
      - 1d

  realtime:
    reconnect_delay_seconds: 5
    heartbeat_timeout_seconds: 30
    snapshot_interval_seconds: 60
    max_stream_buffer: 50000

# ===============================================================
# DATASETS
# ===============================================================
datasets:
  # Core
  ohlcv: true
  trades: false       # pendiente de implementación
  orderbook: false    # recomendado solo en realtime

  # Derivatives
  funding_rate: false
  open_interest: false
  liquidations: false
  mark_price: false
  index_price: false

# ===============================================================
# EXCHANGES
# ===============================================================
exchanges:

  bybit:
    enabled: true
    enableRateLimit: true
    credentials:
      apiKey: ${BYBIT_API_KEY}
      secret: ${BYBIT_API_SECRET}
      # password: no requerido por Bybit
    options:
      adjustForTimeDifference: true
    markets:
      spot:
        enabled: true
        symbols:
          - BTC/USDT
      futures:
        enabled: false
        defaultType: swap
        symbols:
          - BTC/USDT

  kucoin:
    enabled: true
    enableRateLimit: true
    credentials:
      apiKey: ${KUCOIN_API_KEY}
      secret: ${KUCOIN_API_SECRET}
      password: ${KUCOIN_PASSPHRASE}   # requerido por KuCoin
    options:
      adjustForTimeDifference: true
    markets:
      spot:
        enabled: true
        symbols:
          - BTC/USDT
      futures:
        enabled: false
        defaultType: swap
        symbols:
          - BTC/USDT

# ===============================================================
# STORAGE
# ===============================================================
storage:
  data_lake_path: "data_platform/data_lake"
  format: parquet
  compression: snappy
  partitioning:
    - exchange
    - market
    - symbol
    - dataset
    - timeframe
    - year
    - month

# ===============================================================
# INTEGRATIONS (todas deshabilitadas por defecto — opt-in)
# ===============================================================
integrations:

  redis:
    enabled: false
    host: localhost
    port: 6379

  kafka:
    enabled: false
    bootstrap_servers: localhost:9092

  postgres:
    enabled: false
    host: localhost
    port: 5432
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
