# @package _global_
# ==============================================================================
# OrangeCashMachine — Development Configuration
# ==============================================================================
# Overrides sobre base.yaml. Principio: debug-friendly, aislado de producción.
#
# SafeOps: dry_run viene de base.yaml (true por defecto).
# Para escribir en Iceberg en dev, pasar explícitamente por CLI:
#   uv run python main.py safety.dry_run=false
# Esto hace el riesgo visible e intencional, nunca silencioso.
# ==============================================================================

environment:
  name: development
  debug: true

pipeline:
  historical:
    max_concurrent_tasks: 2
  realtime:
    snapshot_interval_seconds: 10
    max_stream_buffer: 1000

observability:
  logging:
    level: DEBUG
    log_dir: logs
    rotation: 1 day
    retention: 7 days
    console: true
    file: true
    pipeline: true
  # metrics: heredado de config/observability/metrics.yaml (SSOT via Hydra compose).
  # No redeclarar aquí — un solo punto de verdad por configuración.
  tracing:
    enabled: false

# storage.data_lake.path: viene de OCM_DATA_LAKE_PATH en .env (SSOT).
# No sobrescribir aquí — un solo punto de verdad por entorno.

integrations:
  redis:
    enabled: ${oc.env:REDIS_ENABLED,true}
    host: ${oc.env:REDIS_HOST,localhost}
    port: ${oc.env:REDIS_PORT,6379}
    db: ${oc.env:REDIS_DB,1}
    password: ${oc.env:REDIS_PASSWORD,""}
  kafka:
    enabled: false
  postgres:
    enabled: false

datasets:
  ohlcv: true      # Bronze → Silver → Gold activo en dev

exchanges:
  bybit:
    enabled: true
    markets:
      spot:
        enabled: true
        symbols:
          - BTC/USDT
  kucoin:
    enabled: true
    markets:
      spot:
        enabled: true
        symbols:
          - BTC/USDT
