# @package _global_
# ==============================================================================
# OrangeCashMachine — Production Configuration (Hardened)
# ==============================================================================

environment:
  name: production
  debug: false

pipeline:
  historical:
    max_concurrent_tasks: null   # resuelto en código — máximo disponible
    backfill_mode: false

  realtime:
    reconnect_delay_seconds: 3
    heartbeat_timeout_seconds: 20

observability:
  logging:
    level: ${oc.env:LOG_LEVEL,INFO}
    format: json

  metrics:
    enabled: true
    exporter: prometheus
    port: ${oc.env:METRICS_PORT,8000}    # explícito en prod — no depender de herencia

  tracing:
    enabled: false

# storage.data_lake.path: viene de OCM_DATA_LAKE_PATH en el entorno (SSOT).
# En producción setear como variable del sistema, no como default en YAML.

integrations:
  redis:
    host: ${oc.env:REDIS_HOST,redis}
    db: ${oc.env:REDIS_DB,1}    # SSOT: alineado con base.yaml y .env

  kafka:
    enabled: ${oc.env:KAFKA_ENABLED,false}
    bootstrap_servers: ${oc.env:KAFKA_BOOTSTRAP_SERVERS,kafka:9092}

  postgres:
    enabled: ${oc.env:POSTGRES_ENABLED,false}
    host: ${oc.env:POSTGRES_HOST,postgres}

safety:
  dry_run: false                   # PRODUCCIÓN: opera real
  prevent_full_reingestion: true
  require_explicit_start: true
  max_backfill_days: 30            # más restrictivo en prod
  require_confirmation: true       # bloquea sin flag explícito
