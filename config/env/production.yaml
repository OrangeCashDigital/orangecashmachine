# @package _global_
# ==============================================================================
# OrangeCashMachine — Production Configuration (Hardened)
# ==============================================================================

environment:
  name: production
  debug: false

pipeline:
  historical:
    max_concurrent_tasks: auto
    backfill_mode: false

  realtime:
    reconnect_delay_seconds: 3
    heartbeat_timeout_seconds: 20

observability:
  logging:
    level: ${oc.env:LOG_LEVEL,INFO}
    format: json

  metrics:
    enabled: true
    exporter: prometheus

  tracing:
    enabled: false

storage:
  data_lake:
    path: ${oc.env:DATA_LAKE_PATH,/var/lib/orangecashmachine/data_lake}

integrations:
  redis:
    enabled: ${oc.env:REDIS_ENABLED,true}
    host: ${oc.env:REDIS_HOST,redis}
    port: ${oc.env:REDIS_PORT,6379}
    db: ${oc.env:REDIS_DB,0}

  kafka:
    enabled: ${oc.env:KAFKA_ENABLED,false}
    bootstrap_servers: ${oc.env:KAFKA_BOOTSTRAP_SERVERS,kafka:9092}

  postgres:
    enabled: ${oc.env:POSTGRES_ENABLED,false}
    host: ${oc.env:POSTGRES_HOST,postgres}
    port: ${oc.env:POSTGRES_PORT,5432}
    user: ${oc.env:POSTGRES_USER,""}
    password: ${oc.env:POSTGRES_PASSWORD,""}

safety:
  dry_run: false                   # PRODUCCIÓN: opera real
  prevent_full_reingestion: true
  require_explicit_start: true
