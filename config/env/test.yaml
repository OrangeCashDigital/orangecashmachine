# @package _global_
# ==============================================================================
# OrangeCashMachine — Test Configuration (CI / Validation)
# ==============================================================================

environment:
  name: test
  debug: false

pipeline:
  historical:
    max_concurrent_tasks: 1
    backfill_mode: false
    timeframes: [1m]

  realtime:
    max_stream_buffer: 1000
    snapshot_interval_seconds: 10

observability:
  logging:
    level: WARNING
    format: json

  metrics:
    enabled: false

# storage.data_lake.path: usa OCM_STORAGE__DATA_LAKE__PATH (SSOT).
# El default de test apunta a test_data_lake para aislar datos de CI.
# Setear OCM_STORAGE__DATA_LAKE__PATH en el entorno de test para override.
storage:
  data_lake:
    path: ${oc.env:OCM_STORAGE__DATA_LAKE__PATH,data_platform/test_data_lake}

integrations:
  redis:
    enabled: ${oc.env:REDIS_ENABLED,false}
    host: ${oc.env:REDIS_HOST,localhost}
    port: ${oc.env:REDIS_PORT,6379}
    db: 2

  kafka:
    enabled: false

  postgres:
    enabled: false

safety:
  dry_run: true
  prevent_full_reingestion: true
  require_explicit_start: false

testing:
  limit_symbols: 1
  use_mock_data: true
  deterministic_mode: true

# Habilitar bybit en test — load_appconfig_standalone filtra exchanges con
# enabled: false. Sin al menos uno activo, validate_exchanges() lanza ValueError.
# En producción los exchanges se controlan por exchanges/*.yaml + env override.
exchanges:
  bybit:
    enabled: true
