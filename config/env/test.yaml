# @package _global_
# ==============================================================================
# OrangeCashMachine — Test Configuration (CI / Validation)
# ==============================================================================

environment:
  name: test
  debug: false

pipeline:
  historical:
    max_concurrent_tasks: 1
    backfill_mode: false
    timeframes: [1m]

  realtime:
    max_stream_buffer: 100
    snapshot_interval_seconds: 5

observability:
  logging:
    level: WARNING
    format: json

  metrics:
    enabled: false

storage:
  data_lake:
    path: ${oc.env:TEST_DATA_LAKE_PATH,data_platform/test_data_lake}

integrations:
  redis:
    enabled: ${oc.env:REDIS_ENABLED,false}
    host: ${oc.env:REDIS_HOST,localhost}
    port: ${oc.env:REDIS_PORT,6379}
    db: 2

  kafka:
    enabled: false

  postgres:
    enabled: false

safety:
  dry_run: true
  prevent_full_reingestion: true
  require_explicit_start: false

testing:
  limit_symbols: 1
  use_mock_data: true
  deterministic_mode: true
