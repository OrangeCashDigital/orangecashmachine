# ==============================================================
# OrangeCashMachine – Production Configuration (Hardened)
# ==================================================================

# ------------------------------------------------------------------------------
# Propósito
# ------------------------------------------------------------------------------
# Overrides específicos de producción.
#
# Se aplica como:
#   base.yaml → production.yaml
#
# Reglas:
# • No hardcodear infraestructura (usar env vars)
# • Configurar comportamiento, no deployment
# • Mantener compatibilidad multi-entorno (Docker / Cloud / Bare-metal)
# ------------------------------------------------------------------------------

# ==============================================================================
# ENVIRONMENT
# ==============================================================================
environment:
  name: production
  debug: false

# ==============================================================================
# PIPELINE (Optimizado para producción)
# ==============================================================================
pipeline:

  historical:
    # Paralelismo dinámico controlado por runtime
    max_concurrent_tasks: auto

    # Producción SIEMPRE incremental (evita reingestión masiva)
    backfill_mode: false

  realtime:
    # Más resiliencia en producción
    reconnect_delay_seconds: 3
    heartbeat_timeout_seconds: 20

# ==============================================================================
# OBSERVABILITY (Production-grade)
# ==============================================================================
observability:

  logging:
    level: ${LOG_LEVEL:-INFO}
    format: json

  metrics:
    enabled: true
    exporter: prometheus

  tracing:
    enabled: false

# ==============================================================================
# STORAGE (Persistencia real)
# ==============================================================================
storage:

  data_lake:
    # Ruta configurable según entorno (VM, container, cloud volume)
    path: ${DATA_LAKE_PATH:-/var/lib/orangecashmachine/data_lake}

# ==============================================================================
# INTEGRATIONS (Desacopladas vía env)
# ==============================================================================
integrations:

  # --------------------------------------------------------
  # Redis (Cursor Store / Estado)
  # --------------------------------------------------------
  redis:
    enabled: ${REDIS_ENABLED:-true}
    host: ${REDIS_HOST:-redis}
    port: ${REDIS_PORT:-6379}
    db: ${REDIS_DB:-0}

  # --------------------------------------------------------
  # Kafka (Streaming / futura expansión)
  # --------------------------------------------------------
  kafka:
    enabled: ${KAFKA_ENABLED:-false}
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}

  # --------------------------------------------------------
  # PostgreSQL (metadata / analytics)
  # --------------------------------------------------------
  postgres:
    enabled: ${POSTGRES_ENABLED:-false}
    host: ${POSTGRES_HOST:-postgres}
    port: ${POSTGRES_PORT:-5432}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

# ==============================================================================
# SAFETY GUARDS
# ==============================================================================
safety:

  # Evita ejecuciones destructivas accidentales
  prevent_full_reingestion: true

  # Requiere confirmación explícita para tareas críticas
  require_explicit_start: true