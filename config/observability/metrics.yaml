# @package _global_
# ==============================================================================
# OrangeCashMachine — Observability: Metrics
# ==============================================================================

observability:
  metrics:
    # Default conservador: métricas desactivadas.
    # Solo production.yaml las activa explícitamente.
    # Esto evita que dev/test exponga un servidor Prometheus innecesario
    # y hace que el estado activo sea siempre una decisión explícita.
    enabled: false
    exporter: prometheus
    port: ${oc.env:METRICS_PORT,8000}

  tracing:
    enabled: false
