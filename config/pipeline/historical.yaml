# @package pipeline.historical
# ==============================================================================
# OrangeCashMachine — Pipeline: Historical
# ==============================================================================
# SSOT del pipeline de ingestión desde exchange.
#
# timeframes: [1m]  — ÚNICO timeframe descargado del exchange.
# Los timeframes derivados (5m, 15m, 1h, 4h, 1d) son producidos
# localmente por ResamplePipeline vía resample_flow — nunca se piden
# al exchange. Esto reduce rate-limit en 6x y elimina inconsistencias
# entre velas de distintos TF del mismo exchange.
#
# start_date: "auto" = backfill dinámico desde cursor existente o inicio completo.
# max_concurrent_tasks: null = resuelto en código (cpu_count // 2), no en YAML.
# Overrides explícitos van en env/*.yaml bajo pipeline.historical.*
# ==============================================================================

start_date: "auto"
auto_lookback_days: 3650   # 10 años — activo solo cuando start_date: "auto"
                           # El loop para cuando el exchange no devuelve más datos.
backfill_mode: false
max_concurrent_tasks: null   # null = resuelto dinámicamente en código
timeframes: [1m]             # Fuente base — resample_flow produce 5m/15m/1h/4h/1d

retry_policy:
  max_attempts: 5
  backoff_factor: 2
  jitter: true
