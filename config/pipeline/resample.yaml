# @package pipeline.resample
# ==============================================================================
# OrangeCashMachine — Pipeline: Resample
# ==============================================================================
# SSOT de los timeframes producidos por ResamplePipeline.
#
# Estos timeframes NO se descargan del exchange — se construyen localmente
# a partir de las velas 1m escritas por HistoricalPipeline.
#
# Invariante del sistema:
#   pipeline.historical.timeframes[0] == source_tf  (fuente base)
#   pipeline.resample.targets          = [5m, 15m, 1h, 4h, 1d]  (derivados)
#
# Hydra:     @package pipeline.resample → colocado en pipeline.resample.*
# Standalone: _load_module anida por path (pipeline/resample → pipeline.resample)
#             → contenido plano, sin wrapper doble.
#
# resample_flow corre cada 1m y llama timeframes_due(now_ms) para
# determinar qué TF tienen su vela cerrada en cada tick.
# ==============================================================================

targets: [5m, 15m, 1h, 4h, 1d]
source_tf: "1m"    # Debe coincidir con pipeline.historical.timeframes[0]
