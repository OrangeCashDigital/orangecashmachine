# ==============================================================================
# OrangeCashMachine — Hydra Root Configuration
# ==============================================================================
# Entry point único. Solo ensambla. Sin lógica de negocio.
#
# CLI USAGE:
#   uv run python main.py                                    # dev (default)
#   uv run python main.py env=production                     # prod
#   uv run python main.py env=test                           # test
#   uv run python main.py pipeline.historical.backfill_mode=true
#   uv run python main.py +settings=local                    # overrides locales
#   uv run python main.py -m env=development,production      # multirun
# ==============================================================================

defaults:
  # Core
  - base

  # Módulos (orden importa: base primero, luego especializados)
  - pipeline/historical
  - pipeline/realtime
  - exchanges/bybit
  - exchanges/kucoin
  - exchanges/kucoinfutures
  - observability/logging
  - observability/metrics
  - storage/datalake
  - risk/risk

  # Entorno (sobreescribe lo anterior)
  - env: development

  # Overrides locales opcionales (NO cargado por defecto — SafeOps)
  # - settings   ← activar con: +settings=local

  # Hydra internal (siempre último)
  - _self_

# ==============================================================================
# HYDRA RUNTIME
# ==============================================================================
hydra:
  run:
    dir: logs/hydra/${oc.env:ENV_NAME,development}/${now:%Y-%m-%d_%H-%M-%S}

  sweep:
    dir: logs/hydra/multirun/${oc.env:ENV_NAME,development}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}

  job:
    chdir: false

  job_logging:
    root:
      level: INFO

  output_subdir: null
