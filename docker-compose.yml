# ==============================================================================
# OrangeCashMachine — Core Infrastructure
# ==============================================================================
#
# Arquitectura de redes
# ---------------------
# ocm_internal : red privada entre servicios (sin acceso externo directo)
# ocm_public   : expone puertos al host para acceso local/dev/ops
#
# Redis está en AMBAS redes:
#   • servicios internos (Dagster, market-data) lo alcanzan via ocm_internal
#   • pipeline local (fuera de Docker) lo alcanza via localhost:6379
#
# Estado de servicios
# -------------------
# ✅ dagster        : orquestador — reemplaza Prefect
# ✅ redis          : cursor store + cache
# ✅ prometheus     : métricas
# ✅ grafana        : visualización
# ✅ alertmanager   : enrutamiento de alertas
# ✅ pushgateway    : recepción de métricas push
# ✅ loki           : agregación de logs
# ✅ promtail       : agente de recolección de logs
# ✅ config-guard   : init container — valida configs antes de arrancar
# 🔕 market-data   : perfil [microservices] — corre en host por defecto
# 🔕 trading        : perfil [microservices]
# 🔕 portfolio      : perfil [microservices]
# ==============================================================================

# ==============================================================================
# Extensiones YAML — reutilización DRY
# ==============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  OCM_CONFIG_DIR: /app/config
  OCM_ENV: ${OCM_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "1"
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}

networks:
  ocm_internal:
    driver: bridge
    internal: true
  ocm_public:
    driver: bridge

services:

  # ────────────────────────────────────────────────────────────────────────────
  # CONFIG-GUARD — Init container: valida archivos de config antes de arrancar.
  # Fail-Fast: si un archivo crítico falta o está vacío, aborta antes de que
  # prometheus/alertmanager intenten levantar con config rota.
  # ────────────────────────────────────────────────────────────────────────────
  config-guard:
    image: busybox:1.36
    container_name: ocm_config_guard
    restart: "no"
    command: >
      sh -c '
        set -e
        check() {
          if [ ! -f "$1" ]; then echo "MISSING: $1"; exit 1; fi
          if [ ! -s "$1" ]; then echo "EMPTY: $1";   exit 1; fi
          echo "OK: $1"
        }
        check /config/prometheus.yml
        check /config/alertmanager.yml
        check /config/alerts.yml
        check /config/loki/loki.yml
        echo "config-guard: all configs valid."
      '
    volumes:
      - type: bind
        source: ./infra/monitoring
        target: /config
        read_only: true
    networks:
      - ocm_internal

  # ────────────────────────────────────────────────────────────────────────────
  # REDIS — Cursor store + cache
  # Expuesto en ocm_public: pipeline local (fuera de Docker) accede por host.
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ocm_redis
    init: true
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --save 60 1000
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # ────────────────────────────────────────────────────────────────────────────
  # DAGSTER — Asset catalog + scheduler + UI
  #
  # Imagen propia (Dockerfile.dagster) — multi-stage build.
  # NO hace pip install en runtime: deps instaladas en build time.
  # Puerto: 3001
  # DAGSTER_HOME: volumen persistente — historial de runs sobrevive reinicios.
  # ────────────────────────────────────────────────────────────────────────────
  dagster:
    build:
      context: .
      dockerfile: Dockerfile.dagster
      target: runtime
    image: ocm_dagster:latest
    container_name: ocm_dagster
    init: true
    restart: unless-stopped
    ports:
      - "${DAGSTER_HOST_PORT:-3001}:3001"
    environment:
      <<: [*common-env, *redis-env]
      DAGSTER_HOME: /dagster_home
      BYBIT_API_KEY: ${BYBIT_API_KEY:-}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET:-}
      KUCOIN_API_KEY: ${KUCOIN_API_KEY:-}
      KUCOIN_API_SECRET: ${KUCOIN_API_SECRET:-}
      KUCOIN_PASSPHRASE: ${KUCOIN_PASSPHRASE:-}
      OCM_STORAGE__DATA_LAKE__PATH: ${OCM_STORAGE__DATA_LAKE__PATH:-/app/data_platform/data_lake}
      PUSHGATEWAY_URL: http://pushgateway:9091
    volumes:
      - dagster_home:/dagster_home
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data_platform:/app/data_platform
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3001/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1500M
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # ────────────────────────────────────────────────────────────────────────────
  # PUSHGATEWAY — Recepción de métricas push desde pipelines
  # ────────────────────────────────────────────────────────────────────────────
  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: ocm_pushgateway
    init: true
    restart: unless-stopped
    ports:
      - "${PUSHGATEWAY_HOST_PORT:-9091}:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # ────────────────────────────────────────────────────────────────────────────
  # PROMETHEUS — Recolección de métricas
  # ────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ocm_prometheus
    init: true
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - type: bind
        source: ./infra/monitoring/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./infra/monitoring/alerts.yml
        target: /etc/prometheus/alerts.yml
        read_only: true
        bind:
          create_host_path: false
      - prometheus_data:/prometheus
    depends_on:
      config-guard:
        condition: service_completed_successfully
      alertmanager:
        condition: service_healthy
      pushgateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # ────────────────────────────────────────────────────────────────────────────
  # ALERTMANAGER — Enrutamiento y deduplicación de alertas
  # ────────────────────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ocm_alertmanager
    init: true
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "${ALERTMANAGER_HOST_PORT:-9093}:9093"
    volumes:
      - type: bind
        source: ./infra/monitoring/alertmanager.yml
        target: /etc/alertmanager/alertmanager.yml
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      config-guard:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # ────────────────────────────────────────────────────────────────────────────
  # GRAFANA — Visualización de métricas
  # ────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: ocm_grafana
    init: true
    restart: unless-stopped
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ocm_pipeline.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # ────────────────────────────────────────────────────────────────────────────
  # LOKI — Agregación de logs estructurados
  # ────────────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: ocm_loki
    init: true
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - type: bind
        source: ./infra/monitoring/loki/loki.yml
        target: /etc/loki/loki.yml
        read_only: true
        bind:
          create_host_path: false
      - loki_data:/loki
    depends_on:
      config-guard:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # ────────────────────────────────────────────────────────────────────────────
  # PROMTAIL — Agente de recolección de logs
  # Lee ./logs/ del host + containers Docker via Docker socket.
  # ────────────────────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: ocm_promtail
    init: true
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    environment:
      OCM_ENV: ${OCM_ENV:-production}
    volumes:
      - type: bind
        source: ./infra/monitoring/promtail/promtail.yml
        target: /etc/promtail/promtail.yml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./logs
        target: /logs
        read_only: true
        bind:
          create_host_path: true
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "grep -q 2378 /proc/net/tcp6"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    networks:
      - ocm_public

  # ────────────────────────────────────────────────────────────────────────────
  # MICROSERVICES — perfil opcional [microservices]
  # Levantar con: docker compose --profile microservices up
  # Por defecto corren en el host durante desarrollo.
  # ────────────────────────────────────────────────────────────────────────────

  market-data:
    profiles: [microservices]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ocm_market_data:latest
    container_name: ocm_market_data
    init: true
    restart: on-failure:5
    depends_on:
      dagster:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*common-env, *redis-env]
      MARKET_DATA_HOST: "0.0.0.0"
      MARKET_DATA_PORT: "8001"
      INGESTION_INTERVAL_S: "${INGESTION_INTERVAL_S:-300}"
      DAGSTER_URL: http://dagster:3001
    ports:
      - "${MARKET_DATA_HOST_PORT:-8001}:8001"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data_platform:/app/data_platform
    command: python -m market_data.main
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1500M
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  trading:
    profiles: [microservices]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ocm_trading:latest
    container_name: ocm_trading
    init: true
    restart: on-failure:5
    depends_on:
      market-data:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*common-env, *redis-env]
      MARKET_DATA_URL: http://market-data:8001
      TRADING_HOST: "0.0.0.0"
      TRADING_PORT: "8002"
    ports:
      - "${TRADING_HOST_PORT:-8002}:8002"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data_platform:/app/data_platform
    command: python -m trading.main
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  portfolio:
    profiles: [microservices]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ocm_portfolio:latest
    container_name: ocm_portfolio
    init: true
    restart: on-failure:5
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: [*common-env, *redis-env]
      PORTFOLIO_HOST: "0.0.0.0"
      PORTFOLIO_PORT: "8003"
    ports:
      - "${PORTFOLIO_HOST_PORT:-8003}:8003"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    command: python -m portfolio.main
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

volumes:
  dagster_home:
    name: ocm_dagster_home
  redis_data:
    name: ocm_redis_data
  grafana_data:
    name: ocm_grafana_data
  prometheus_data:
    name: ocm_prometheus_data
  loki_data:
    name: ocm_loki_data
