# ==========================================================
# OrangeCashMachine – Core Infrastructure
# ==========================================================
#
# Arquitectura de redes
# ---------------------
# ocm_internal : red privada entre servicios (sin acceso externo)
# ocm_public   : expone puertos al host para acceso local/dev
#
# Redis está en AMBAS redes para que:
#   • los servicios internos (Prefect, market-data) lo alcancen
#   • el pipeline local (fuera de Docker) lo alcance vía localhost
#
# Prometheus y Grafana solo en ocm_public porque exponen UI.
# Postgres solo en ocm_internal — nunca expuesto al exterior.
#
# Estado de servicios
# -------------------
# ✅ postgres        : activo — metadata de Prefect
# ✅ prefect-server  : activo — orquestador
# ✅ redis           : activo — cursor store + cache
# ✅ prometheus      : activo — métricas
# ✅ grafana         : activo — visualización
# ✅ alertmanager    : activo — enrutamiento de alertas
# ✅ pushgateway     : activo — recepción de métricas
# 🔕 market-data    : deshabilitado — corre en máquina local
#                     rehabilitar para despliegue distribuido
# ==========================================================

# ----------------------------------------------------------
# Extension: Logging centralizado con rotación
# ----------------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# ----------------------------------------------------------
# Extension: Variables de entorno comunes (DRY)
# ----------------------------------------------------------
x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  OCM_CONFIG_DIR: /app/config
  OCM_ENV: ${OCM_ENV:-production}

# ----------------------------------------------------------
# Networks
# ----------------------------------------------------------
networks:
  ocm_internal:
    driver: bridge
    internal: true   # sin acceso a internet — aislamiento de servicios

  ocm_public:
    driver: bridge   # acceso al host para desarrollo local y UIs

# ==========================================================
# SERVICES
# ==========================================================
services:

  # --------------------------------------------------------
  # POSTGRES — Metadata store de Prefect
  # --------------------------------------------------------
  postgres:
    image: postgres:15.6-alpine
    container_name: ocm_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prefect}
      POSTGRES_DB: prefect

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    logging: *default-logging
    networks:
      - ocm_internal   # solo acceso interno — nunca expuesto al host

  # --------------------------------------------------------
  # PREFECT SERVER — Orquestador de pipelines
  # --------------------------------------------------------
  prefect-server:
    image: prefecthq/prefect:2.19.5-python3.11
    container_name: ocm_prefect_server
    init: true
    restart: unless-stopped

    command: >
      prefect server start
      --host 0.0.0.0
      --port 4200

    ports:
      - "${PREFECT_HOST_PORT:-4200}:4200"

    environment:
      <<: *common-env
      PREFECT_API_DATABASE_CONNECTION_URL: >-
        postgresql+asyncpg://prefect:${POSTGRES_PASSWORD:-prefect}@postgres:5432/prefect

    volumes:
      - prefect_data:/prefect

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:4200/api/health\")"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # REDIS — Cursor store + cache
  #
  # Expuesto al host vía REDIS_HOST_PORT para que el pipeline
  # local (fuera de Docker) pueda conectarse a localhost:6379.
  # En producción distribuida: eliminar ports y usar solo
  # ocm_internal con REDIS_HOST=ocm_redis.
  # --------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: ocm_redis
    init: true
    restart: unless-stopped

    command: >
      redis-server
      --appendonly yes
      --save 60 1000
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru

    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    logging: *default-logging
    networks:
      - ocm_internal   # acceso desde Prefect y market-data en Docker
      - ocm_public     # acceso desde pipeline local vía localhost

  # --------------------------------------------------------
  # PROMETHEUS — Recolección de métricas
  #
  # Requiere ./infra/prometheus.yml en el host.
  # Crear con: mkdir -p infra && touch infra/prometheus.yml
  # --------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ocm_prometheus
    init: true
    restart: unless-stopped

    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"

    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # GRAFANA — Visualización de métricas
  # --------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: ocm_grafana
    init: true
    restart: unless-stopped

    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      prometheus:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # MARKET DATA PIPELINE — DESHABILITADO
  #
  # ⚠️  Corre actualmente en máquina local (fuera de Docker).
  #     Conecta a Redis vía localhost:${REDIS_HOST_PORT}.
  #     Rehabilitar SOLO para despliegue distribuido:
  #       1. Descomentar este bloque
  #       2. Cambiar REDIS_HOST a ocm_redis
  #       3. Eliminar ports de redis (no necesario en cluster)
  # --------------------------------------------------------
  # market-data:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #
  #   container_name: ocm_market_data
  #   init: true
  #   restart: on-failure
  #
  #   depends_on:
  #     prefect-server:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #
  #   environment:
  #     <<: *common-env
  #     PREFECT_API_URL: http://ocm_prefect_server:4200/api
  #     REDIS_HOST: ocm_redis
  #     REDIS_PORT: 6379
  #     REDIS_DB: 0
  #
  #   volumes:
  #     - ./config:/app/config:ro
  #     - ./logs:/app/logs
  #     - ./data_platform:/app/data_platform
  #
  #   working_dir: /app
  #   command: python -m market_data.orchestration.entrypoint
  #
  #   read_only: true
  #   tmpfs:
  #     - /tmp
  #
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "1.0"
  #         memory: 1G
  #
  #   logging: *default-logging
  #   networks:
  #     - ocm_internal

  # --------------------------------------------------------
  # ALERTMANAGER — Enrutamiento y deduplicación de alertas
  # --------------------------------------------------------
  ocm_alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ocm_alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "${ALERTMANAGER_HOST_PORT:-9093}:9093"
    volumes:
      - ./infra/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  ocm_pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: ocm_pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

# ==========================================================
# VOLUMES — Estado persistente
# ==========================================================
volumes:
  postgres_data:
    name: ocm_postgres_data
  prefect_data:
    name: ocm_prefect_data
  redis_data:
    name: ocm_redis_data
  grafana_data:
    name: ocm_grafana_data
  prometheus_data:
    name: ocm_prometheus_data
