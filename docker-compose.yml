# ==========================================================
# OrangeCashMachine – Core Infrastructure
# ==========================================================
#
# Arquitectura de redes
# ---------------------
# ocm_internal : red privada entre servicios (sin acceso externo)
# ocm_public   : expone puertos al host para acceso local/dev
#
# Redis está en AMBAS redes para que:
#   • los servicios internos (Prefect, market-data) lo alcancen
#   • el pipeline local (fuera de Docker) lo alcance vía localhost
#
# Prometheus, Grafana, Alertmanager y Pushgateway en ocm_public
# porque exponen UI o endpoints de ingesta desde el host.
# Postgres solo en ocm_internal — nunca expuesto al exterior.
#
# Estado de servicios
# -------------------
# ✅ postgres        : activo — metadata de Prefect
# ✅ prefect-server  : activo — orquestador
# ✅ redis           : activo — cursor store + cache
# ✅ prometheus      : activo — métricas
# ✅ grafana         : activo — visualización
# ✅ alertmanager    : activo — enrutamiento de alertas
# ✅ pushgateway     : activo — recepción de métricas push
# ✅ loki            : activo — agregación de logs
# ✅ promtail        : activo — agente de recolección de logs
# 🔕 market-data    : deshabilitado — corre en máquina local
#                     rehabilitar para despliegue distribuido
# ==========================================================

# ==========================================================
# EXTENSIONS (Librería Pro)
# ==========================================================

# Reutilización de configuración común para logging y variables de entorno
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  OCM_CONFIG_DIR: /app/config
  OCM_ENV: ${OCM_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-debug}

networks:
  ocm_internal:
    driver: bridge
    internal: true
  ocm_public:
    driver: bridge

services:

  # --------------------------------------------------------
  # POSTGRES — Metadata store de Prefect
  # --------------------------------------------------------
  # --------------------------------------------------------
  # CONFIG GUARD — Init container de validación de configs
  #
  # Protege el arranque desde cero (boot, docker compose up).
  # Si un archivo crítico falta o está vacío, falla explícitamente
  # antes de que prometheus o alertmanager intenten arrancar.
  #
  # ⚠️  No detecta cambios en caliente: un bind mount activo
  # mantiene el inode del archivo original aunque se borre del host.
  # Para integridad en runtime se requeriría un sidecar o cron.
  # --------------------------------------------------------
  config-guard:
    image: busybox:1.36
    container_name: ocm_config_guard
    restart: "no"
    command: >
      sh -c '
        set -e
        check() {
          if [ ! -f "$1" ]; then
            echo "MISSING: $1"; exit 1
          fi
          if [ ! -s "$1" ]; then
            echo "EMPTY: $1"; exit 1
          fi
          echo "OK: $1"
        }
        check /config/prometheus.yml
        check /config/alertmanager.yml
        check /config/alerts.yml
        check /config/loki/loki.yml
        echo "config-guard: all configs valid."
      '
    volumes:
      - type: bind
        source: ./infra/monitoring
        target: /config
        read_only: true
    networks:
      - ocm_internal

  postgres:
    image: postgres:15.6-alpine
    container_name: ocm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: prefect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      - ocm_internal

  # --------------------------------------------------------
  # PREFECT SERVER — Orquestador de pipelines
  # --------------------------------------------------------
  prefect-server:
    image: prefecthq/prefect:2.19.5-python3.11
    container_name: ocm_prefect_server
    init: true
    restart: unless-stopped
    command: >
      prefect server start
      --host 0.0.0.0
      --port 4200
    ports:
      - "${PREFECT_HOST_PORT:-4200}:4200"
    environment:
      <<: *common-env
      PREFECT_API_DATABASE_CONNECTION_URL: >-
        postgresql+asyncpg://prefect:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/prefect
    volumes:
      - prefect_data:/prefect
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:4200/api/health\")"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # REDIS — Cursor store + cache
  # SEGURIDAD: REDIS_PASSWORD requerido
  # --------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: ocm_redis
    init: true
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --save 60 1000
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # PROMETHEUS — Recolección de métricas
  # --------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ocm_prometheus
    init: true
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - type: bind
        source: ./infra/monitoring/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./infra/monitoring/alerts.yml
        target: /etc/prometheus/alerts.yml
        read_only: true
        bind:
          create_host_path: false
      - prometheus_data:/prometheus
    depends_on:
      config-guard:
        condition: service_completed_successfully
      alertmanager:
        condition: service_healthy
      pushgateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # GRAFANA — Visualización de métricas
  # --------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: ocm_grafana
    init: true
    restart: unless-stopped
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ocm_pipeline.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # ALERTMANAGER — Enrutamiento y deduplicación de alertas
  # --------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ocm_alertmanager
    init: true
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "${ALERTMANAGER_HOST_PORT:-9093}:9093"
    volumes:
      - type: bind
        source: ./infra/monitoring/alertmanager.yml
        target: /etc/alertmanager/alertmanager.yml
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      config-guard:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # PUSHGATEWAY — Recepción de métricas push desde pipelines
  # --------------------------------------------------------
  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: ocm_pushgateway
    init: true
    restart: unless-stopped
    ports:
      - "${PUSHGATEWAY_HOST_PORT:-9091}:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # MARKET-DATA-SERVICE — Ingesta OHLCV + HTTP API :8001
  #
  # Proceso independiente: corre aunque trading-service
  # o portfolio-service estén caídos.
  #
  # Entrypoint: market_data/main.py (FastAPI + ingestion loop)
  # Boundary:   no importa trading/ ni portfolio/ — solo ocm_platform
  # --------------------------------------------------------
  market-data:
    profiles: [microservices]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocm_market_data
    init: true
    restart: on-failure:5
    depends_on:
      prefect-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PREFECT_API_URL: http://prefect-server:4200/api
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      MARKET_DATA_HOST: "0.0.0.0"
      MARKET_DATA_PORT: "8001"
      INGESTION_INTERVAL_S: "${INGESTION_INTERVAL_S:-300}"
    ports:
      - "${MARKET_DATA_HOST_PORT:-8001}:8001"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data_platform:/app/data_platform
    working_dir: /app
    command: python -m market_data.main
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1500M
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # TRADING-SERVICE — Estrategias + señales + ejecución :8002
  #
  # Consume OHLCV de market-data-service vía HTTP.
  # No importa market_data/ directamente — boundary via red.
  # --------------------------------------------------------
  trading:
    profiles: [microservices]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocm_trading
    init: true
    restart: on-failure:5
    depends_on:
      market-data:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      MARKET_DATA_URL: http://market-data:8001
      TRADING_HOST: "0.0.0.0"
      TRADING_PORT: "8002"
    ports:
      - "${TRADING_HOST_PORT:-8002}:8002"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data_platform:/app/data_platform
    working_dir: /app
    command: python -m trading.main
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # PORTFOLIO-SERVICE — Posiciones + PnL + risk :8003
  #
  # Consume fills de trading-service vía Redis Stream.
  # No importa trading/ ni market_data/ directamente.
  # --------------------------------------------------------
  portfolio:
    profiles: [microservices]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocm_portfolio
    init: true
    restart: on-failure:5
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      PORTFOLIO_HOST: "0.0.0.0"
      PORTFOLIO_PORT: "8003"
    ports:
      - "${PORTFOLIO_HOST_PORT:-8003}:8003"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    working_dir: /app
    command: python -m portfolio.main
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public


  # --------------------------------------------------------
  # LOKI — Agregación de logs estructurados
  # --------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: ocm_loki
    init: true
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - type: bind
        source: ./infra/monitoring/loki/loki.yml
        target: /etc/loki/loki.yml
        read_only: true
        bind:
          create_host_path: false
      - loki_data:/loki
    depends_on:
      config-guard:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - ocm_internal
      - ocm_public

  # --------------------------------------------------------
  # PROMTAIL — Agente de recolección de logs
  # Lee ./logs/ del host + containers Docker
  # --------------------------------------------------------
  promtail:
    image: grafana/promtail:3.0.0
    container_name: ocm_promtail
    init: true
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    environment:
      OCM_ENV: ${OCM_ENV:-development}
    volumes:
      - type: bind
        source: ./infra/monitoring/promtail/promtail.yml
        target: /etc/promtail/promtail.yml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./logs
        target: /logs
        read_only: true
        bind:
          create_host_path: true
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "grep -q 2378 /proc/net/tcp6"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    networks:
      - ocm_public

volumes:
  postgres_data:
    name: ocm_postgres_data
  prefect_data:
    name: ocm_prefect_data
  redis_data:
    name: ocm_redis_data
  grafana_data:
    name: ocm_grafana_data
  prometheus_data:
    name: ocm_prometheus_data
  loki_data:
    name: ocm_loki_data
