#
# ==========================================================
# OrangeCashMachine – Market Data Infrastructure (Production-Ready)
# ==========================================================

# ----------------------------------------------------------
# Logging (DRY + SafeOps)
# ----------------------------------------------------------
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

# ----------------------------------------------------------
# Entorno común (DRY)
# ----------------------------------------------------------
x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  OCM_CONFIG_DIR: /app/config
  OCM_ENV: ${OCM_ENV:-production}

# ----------------------------------------------------------
# Prefect client config
# ----------------------------------------------------------
x-prefect-env: &prefect-env
  PREFECT_API_URL: http://prefect-server:4200/api

# ==========================================================
# SERVICES
# ==========================================================
services:

  # =======================================================
  # PREFECT SERVER (Orquestación)
  # =======================================================
  prefect-server:
    image: prefecthq/prefect:2.19.5-python3.11
    container_name: ocm_prefect_server

    command: prefect server start --host 0.0.0.0 --port 4200

    ports:
      - "4200:4200"

    environment:
      <<: *common-env
      PREFECT_API_URL: http://0.0.0.0:4200/api
      PREFECT_SERVER_DATABASE_CONNECTION_URL: sqlite+aiosqlite:////prefect/prefect.db

    volumes:
      - prefect_data:/prefect

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    restart: unless-stopped
    logging: *default-logging

  # =======================================================
  # REDIS (Estado / Cursor / Cache)
  # =======================================================
  redis:
    image: redis:7-alpine
    container_name: ocm_redis

    command: redis-server --appendonly yes --save 60 1000

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

    restart: unless-stopped
    logging: *default-logging

  # =======================================================
  # PROMETHEUS (Métricas)
  # =======================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ocm_prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    depends_on:
      - market-data

    restart: unless-stopped
    logging: *default-logging

  # =======================================================
  # GRAFANA (Visualización)
  # =======================================================
  grafana:
    image: grafana/grafana:latest
    container_name: ocm_grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    restart: unless-stopped
    logging: *default-logging

  # =======================================================
  # MARKET DATA PIPELINE
  # =======================================================
  market-data:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ocm_market_data

    depends_on:
      prefect-server:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      <<: [*common-env, *prefect-env]
      REDIS_HOST: redis
      REDIS_PORT: 6379

    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data_platform:/app/data_platform

    working_dir: /app

    command: python -m market_data.orchestration.entrypoint

    restart: "no"
    logging: *default-logging

# ==========================================================
# VOLUMES (Persistencia)
# ==========================================================
volumes:
  prefect_data:
  redis_data:
  grafana_data: