# dagster.yaml
# ============
# Configuración declarativa de Dagster para OrangeCashMachine.
#
# SSOT: este archivo es la única fuente de verdad para:
#   - límites de concurrencia por tipo de asset
#   - coordinación de runs
#   - retención de logs y runs
#
# Storage (SQLite)
# ----------------
# run_storage y event_log_storage NO se declaran explícitamente.
# SQLite en $DAGSTER_HOME/storage es el default del framework.
# Declarar module paths internos (dagster.core.*) acopla a APIs privadas
# que cambian entre releases — innecesario para el backend default.
#
# Concurrencia por concurrency_key (definido en cada asset via tags):
#   bronze_ingestion : IO-bound, rate-limited por exchange — límite bajo
#   silver_resample  : CPU-bound, local — puede paralelizar más
#   repair_gaps      : secuencial por diseño — límite 1
#
# Ref: https://docs.dagster.io/guides/limiting-concurrency-in-data-pipelines

concurrency:
  default_op_concurrency_limit: 4

  # Límites por concurrency_key — SSOT de throttling por perfil.
  # Keys deben coincidir exactamente con los tags de los assets.
  # Ver infrastructure/dagster/assets/ (bronze_ohlcv.py, resample_ohlcv.py, repair_ohlcv.py)
  pools:
    bronze_ingestion:
      run_limit: 2    # IO-bound: respeta rate-limits de exchange
    silver_resample:
      run_limit: 4    # CPU-bound local: puede paralelizar
    repair_gaps:
      run_limit: 1    # Secuencial: repair modifica estado, no paralelizable

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 2
    tag_concurrency_limits:
      # Segunda capa de control: evita que un exchange monopolice todos los slots
      - key: "exchange"
        value: "bybit"
        limit: 1
      - key: "exchange"
        value: "kucoin"
        limit: 1
      - key: "exchange"
        value: "kucoin_futures"
        limit: 1

# Retención: evita crecimiento ilimitado del SQLite de Dagster
retention:
  runs:
    exclude_tags:
      scheduled: false
    purge_after_days:
      success: 30
      failure: 60
  schedule:
    purge_after_days: 7
  sensor:
    purge_after_days: 7
