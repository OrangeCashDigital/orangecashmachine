[build-system]
requires = [
    "hatchling>=1.16.0",
]
build-backend = "hatchling.build"

[project]
name = "orangecashmachine"
version = "0.3.0"
description = "Pipeline profesional de ingestión, procesamiento y almacenamiento de datos de mercado cripto — arquitectura medallion (Bronze/Silver/Gold), orquestación Dagster, data lakehouse Iceberg/DuckDB, observabilidad Prometheus"
readme = "README.md"
authors = [
    { name = "orangemusic" },
]
requires-python = ">=3.11,<3.14"
keywords = [
    "trading",
    "algorithmic-trading",
    "market-data",
    "crypto",
    "data-pipeline",
    "data-lakehouse",
    "iceberg",
    "dagster",
    "ccxt",
    "ohlcv",
    "quant",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial :: Investment",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Typing :: Typed",
]
dependencies = [
    "dagster>=1.7.0,<2.0",
    "dagster-webserver>=1.7.0,<2.0",
    "pydantic==2.8.2",
    "pydantic-settings>=2.13.1,<3.0",
    "pandera>=0.20.0",
    "numpy>=2.0,<3.0",
    "pandas>=2.3,<3.0",
    "pyarrow>=17.0,<20.0",
    "ccxt==4.3.58",
    "loguru==0.7.2",
    "structlog>=24.1.0,<25.0",
    "httpx>=0.27.0,<1.0",
    "prometheus-client>=0.20.0,<1.0",
    "pyyaml==6.0.2",
    "python-dotenv>=1.0,<3.0",
    "hydra-core>=1.3.2,<2.0",
    "aioresilience==0.2.1",
    "aiometer>=0.10.0",
    "pybreaker==1.4.1",
    "redis>=7.4.0,<8.0",
    "aiokafka>=0.11.0,<1.0",
    "pyiceberg[pyarrow,sql-sqlite]>=0.9.1,<1.0",
    "duckdb>=1.5.1,<2.0",
    "pyspark>=4.1.1,<5.0",
    "fastapi>=0.111.0,<1.0",
    "uvicorn[standard]>=0.14.0,<0.29.0",
    "python-jose[cryptography]>=3.3.0,<4.0",
    "polars[rtcompat]>=1.40.1",
]

[project.license]
text = "MIT"

[project.scripts]
ocm = "app.cli.main:main"
ocm-api = "api.main:serve"
live = "app.cli.live:main"
paper = "app.cli.paper:main"

[project.urls]
Repository = "https://github.com/orangemusic/orangecashmachine"

[project.optional-dependencies]
docs = [
    "sphinx>=7.0,<8.0",
    "sphinx-autodoc-typehints>=1.22,<2.0",
]
ci = [
    "pre-commit>=3.3,<4.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0,<9.0",
    "pytest-asyncio>=0.23,<1.0",
    "pytest-cov>=5.0,<6.0",
    "mypy>=1.9,<2.0",
    "ruff>=0.4,<1.0",
    "import-linter>=2.1,<3.0",
    "structlog>=24.4.0",
    "httpx>=0.28.1",
]

[tool.importlinter]
include_external_packages = true
root_packages = [
    "market_data",
    "ocm_platform",
    "trading",
    "data_platform",
    "portfolio",
    "app",
    "shared",
    "infrastructure",
]

[[tool.importlinter.contracts]]
name = "BC-09: shared is dependency-free (stdlib + third-party only)"
type = "forbidden"
source_modules = [
    "shared",
]
forbidden_modules = [
    "market_data",
    "trading",
    "portfolio",
    "ocm_platform",
    "data_platform",
    "infrastructure",
    "app",
    "api",
    "domain",
]

[[tool.importlinter.contracts]]
name = "BC-01: no direct ccxt_adapter imports"
type = "forbidden"
source_modules = [
    "market_data.application",
    "market_data.quality",
    "market_data.infrastructure",
    "trading",
]
forbidden_modules = [
    "market_data.adapters.exchange.ccxt_adapter",
]

[[tool.importlinter.contracts]]
name = "BC-02: market_data no importa trading ni data_platform"
type = "forbidden"
source_modules = [
    "market_data",
]
forbidden_modules = [
    "trading",
    "data_platform",
]

[[tool.importlinter.contracts]]
name = "BC-03: signals isolated from execution"
type = "forbidden"
source_modules = [
    "trading.strategies",
]
forbidden_modules = [
    "trading.execution",
    "trading.analytics",
]

[[tool.importlinter.contracts]]
name = "BC-04: risk isolated from execution"
type = "forbidden"
source_modules = [
    "trading.risk",
]
forbidden_modules = [
    "trading.execution",
]

[[tool.importlinter.contracts]]
name = "BC-06: platform has no business logic dependencies"
type = "forbidden"
source_modules = [
    "ocm_platform",
]
forbidden_modules = [
    "market_data",
    "trading",
    "data_platform",
    "infra",
]

[[tool.importlinter.contracts]]
name = "BC-07: portfolio isolated from execution"
type = "forbidden"
source_modules = [
    "portfolio",
]
forbidden_modules = [
    "trading.execution",
    "trading.strategies",
]

[[tool.importlinter.contracts]]
name = "BC-08: api is a pure consumer"
type = "forbidden"
source_modules = [
    "ocm_platform",
    "market_data",
    "trading",
    "data_platform",
    "app",
    "portfolio",
]
forbidden_modules = [
    "api",
]

[[tool.importlinter.contracts]]
name = "BC-10: infrastructure depends only on platform abstractions"
type = "forbidden"
source_modules = [
    "infrastructure",
]
forbidden_modules = [
    "trading",
    "portfolio",
    "data_platform",
    "app",
    "api",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "tests",
]
log_cli = true
log_cli_level = "DEBUG"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
ignore = [
    "E402",
]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
exclude = [
    "tests/",
    ".venv/",
]

[tool.hatch.build.targets.wheel]
packages = [
    "api",
    "app",
    "data_platform",
    "shared",
    "domains/market_data",
    "domains/portfolio",
    "domains/trading",
    "platform/infrastructure",
    "platform/ocm_platform",
]

[tool.hatch.build.targets.wheel.sources]
"domains/market_data" = "market_data"
"domains/portfolio" = "portfolio"
"domains/trading" = "trading"
"platform/ocm_platform" = "ocm_platform"
"platform/infrastructure" = "infrastructure"
