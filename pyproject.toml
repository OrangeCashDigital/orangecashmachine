[build-system]
requires = ["hatchling>=1.16.0"]
build-backend = "hatchling.build"

[project]
name = "orangecashmachine"
version = "0.2.0"
description = "Pipeline profesional de ingestión, procesamiento y almacenamiento de datos de mercado cripto — soporta OHLCV, trades, orderbook y derivados con arquitectura medallion (Bronze/Silver/Gold), orquestación Prefect, data lakehouse Iceberg/DuckDB y observabilidad Prometheus"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "orangemusic" }]
requires-python = ">=3.11,<3.13"
keywords = [
    "trading", "algorithmic-trading", "market-data", "crypto",
    "data-pipeline", "data-lakehouse", "iceberg", "prefect",
    "ccxt", "ohlcv", "quant",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial :: Investment",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Typing :: Typed",
]

dependencies = [
    # ── Orquestación ──────────────────────────────────────────────────
    "prefect==2.19.5",
    "griffe==0.32.3",             # requerido por prefect 2.x — no actualizar sin verificar

    # ── Validación y tipado ───────────────────────────────────────────
    "pydantic==2.8.2",
    "pydantic-settings>=2.13.1,<3.0",
    "pandera==0.19.3",

    # ── Procesamiento de datos ────────────────────────────────────────
    "numpy>=1.26.4,<2.0",         # <2.0 evita breaking changes en downstream
    "pandas==2.2.2",
    "pyarrow==16.1.0",            # fijado — pyiceberg 0.8.1 requiere esta versión exacta

    # ── Exchanges ─────────────────────────────────────────────────────
    "ccxt==4.3.58",

    # ── Logging y observabilidad ──────────────────────────────────────
    "loguru==0.7.2",
    "structlog>=24.1.0,<25.0",
    "httpx>=0.27.0,<1.0",             # sink Loki — push HTTP
    "prometheus-client>=0.20.0,<1.0",

    # ── Configuración ─────────────────────────────────────────────────
    "pyyaml==6.0.2",
    "python-dotenv>=1.0,<3.0",
    "hydra-core>=1.3.2,<2.0",    # core/config/hydra_loader.py + main.py

    # ── Resiliencia ───────────────────────────────────────────────────
    # pinned: only version available in registry — do not upgrade without verifying PyPI
    "aioresilience==0.2.1",
    "aiometer>=0.10.0",
    "pybreaker==1.4.1",

    # ── Estado y coordinación ─────────────────────────────────────────
    "redis>=7.4.0,<8.0",

    # ── Data lakehouse ────────────────────────────────────────────────
    "pyiceberg[pyarrow,sql-sqlite]>=0.8.1,<1.0",
    "duckdb>=1.5.1,<2.0",
    "pyspark>=4.1.1,<5.0",
]

[project.scripts]
ocm = "main:main"

[project.urls]
Repository = "https://github.com/orangemusic/orangecashmachine"

[project.optional-dependencies]
docs = [
    "sphinx>=7.0,<8.0",
    "sphinx-autodoc-typehints>=1.22,<2.0",
]
ci = [
    "pre-commit>=3.3,<4.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0,<9.0",
    "pytest-asyncio>=0.23,<1.0",
    "pytest-cov>=5.0,<6.0",
    "mypy>=1.9,<2.0",
    "ruff>=0.4,<1.0",
    "import-linter>=2.1,<3.0",
    "structlog>=24.4.0",
    "httpx>=0.28.1",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
log_cli = true
log_cli_level = "DEBUG"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
# E402: "module level import not at top of file"
# Falso positivo masivo en este codebase: el patrón from __future__ import annotations
# seguido de un docstring hace que ruff reporte todos los imports como E402.
# Es un patrón intencional y correcto — no indica código mal estructurado.
# Ref: https://docs.astral.sh/ruff/rules/module-import-not-at-top-of-file/
ignore = ["E402"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
exclude = ["tests/", ".venv/"]

[tool.hatch.build.targets.wheel]
packages = [
    "core",
    "infra",
    "market_data",
    "data_platform",
    "trading",
    "backtesting",
]

# =============================================================================
# import-linter — enforcement de boundary market_data.adapters.exchange
# Regla: ningún consumidor externo puede importar ccxt_adapter directamente.
# Solo market_data.adapters.exchange (el propio módulo) tiene ese permiso.
# Ejecutar: uv run lint-imports
# =============================================================================
[tool.importlinter]
root_packages = ["market_data", "core", "infra"]

[[tool.importlinter.contracts]]
name    = "exchange adapter boundary — no direct ccxt_adapter imports"
type    = "forbidden"
source_modules = [
    "market_data.ingestion",
    "market_data.processing",
    "market_data.orchestration",
    "market_data.quality",
    "trading",
    "core",
    "infra",
]
forbidden_modules = ["market_data.adapters.exchange.ccxt_adapter"]
