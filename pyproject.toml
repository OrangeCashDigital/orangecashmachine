[build-system]
requires = ["hatchling>=1.16.0"]
build-backend = "hatchling.build"

[project]
name = "orangecashmachine"
version = "0.3.0"
description = "Pipeline profesional de ingestión, procesamiento y almacenamiento de datos de mercado cripto — arquitectura medallion (Bronze/Silver/Gold), orquestación Dagster, data lakehouse Iceberg/DuckDB, observabilidad Prometheus"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "orangemusic" }]
requires-python = ">=3.11,<3.14"
keywords = [
    "trading", "algorithmic-trading", "market-data", "crypto",
    "data-pipeline", "data-lakehouse", "iceberg", "dagster",
    "ccxt", "ohlcv", "quant",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial :: Investment",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Typing :: Typed",
]

dependencies = [
    # ── Orquestación ──────────────────────────────────────────────────
    "dagster>=1.7.0,<2.0",
    "dagster-webserver>=1.7.0,<2.0",
    # ── Validación y tipado ───────────────────────────────────────────
    "pydantic==2.8.2",
    "pydantic-settings>=2.13.1,<3.0",
    "pandera==0.19.3",
    # ── Procesamiento de datos ────────────────────────────────────────
    "numpy>=2.0,<3.0",
    "pandas>=2.3,<3.0",
    "pyarrow>=17.0,<20.0",            # fijado — pyiceberg 0.8.1 requiere esta versión exacta
    # ── Exchanges ─────────────────────────────────────────────────────
    "ccxt==4.3.58",
    # ── Logging y observabilidad ──────────────────────────────────────
    "loguru==0.7.2",
    "structlog>=24.1.0,<25.0",
    "httpx>=0.27.0,<1.0",
    "prometheus-client>=0.20.0,<1.0",
    # ── Configuración ─────────────────────────────────────────────────
    "pyyaml==6.0.2",
    "python-dotenv>=1.0,<3.0",
    "hydra-core>=1.3.2,<2.0",
    # ── Resiliencia ───────────────────────────────────────────────────
    "aioresilience==0.2.1",       # pinned: only version in registry
    "aiometer>=0.10.0",
    "pybreaker==1.4.1",
    # ── Estado y coordinación ─────────────────────────────────────────
    "redis>=7.4.0,<8.0",
    # ── Data lakehouse ────────────────────────────────────────────────
    "pyiceberg[pyarrow,sql-sqlite]>=0.9.1,<1.0",
    "duckdb>=1.5.1,<2.0",
    "pyspark>=4.1.1,<5.0",
    # ── API Gateway ───────────────────────────────────────────────────
    "fastapi>=0.111.0,<1.0",
    "uvicorn[standard]>=0.14.0,<0.29.0",
    "python-jose[cryptography]>=3.3.0,<4.0",
    "polars[rtcompat]>=1.40.1",
]

[project.scripts]
# SSOT de entrypoints CLI — Fail-Fast en install time si el target no existe.
ocm     = "app.cli.main:main"    # market data pipeline (Hydra)
ocm-api = "api.main:serve"       # FastAPI gateway
live    = "app.cli.live:main"    # live trading ⚠️  capital real
paper   = "app.cli.paper:main"   # paper trading

[project.urls]
Repository = "https://github.com/orangemusic/orangecashmachine"

[project.optional-dependencies]
docs = [
    "sphinx>=7.0,<8.0",
    "sphinx-autodoc-typehints>=1.22,<2.0",
]
ci = [
    "pre-commit>=3.3,<4.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0,<9.0",
    "pytest-asyncio>=0.23,<1.0",
    "pytest-cov>=5.0,<6.0",
    "mypy>=1.9,<2.0",
    "ruff>=0.4,<1.0",
    "import-linter>=2.1,<3.0",
    "structlog>=24.4.0",
    "httpx>=0.28.1",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
log_cli = true
log_cli_level = "DEBUG"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
# E402: falso positivo con from __future__ import annotations + docstring.
# Patrón intencional — no indica código mal estructurado.
ignore = ["E402"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
exclude = ["tests/", ".venv/"]

[tool.hatch.build.targets.wheel]
packages = [
    "api",
    "ocm_platform",
    "core",
    "infra",
    "market_data",
    "data_platform",
    "trading",
    "backtesting",
]

# =============================================================================
# import-linter — boundary enforcement
# Ejecutar: uv run lint-imports
# =============================================================================
[tool.importlinter]
include_external_packages = true
root_packages = ["market_data", "ocm_platform", "trading", "data_platform", "portfolio", "app"]

[[tool.importlinter.contracts]]
name    = "BC-01: no direct ccxt_adapter imports"
type    = "forbidden"
source_modules = [
    "market_data.ingestion",
    "market_data.processing",
    "market_data.quality",
    "trading",
]
forbidden_modules = ["market_data.adapters.exchange.ccxt_adapter"]
ignore_imports = [
    "market_data.adapters.exchange -> market_data.adapters.exchange.ccxt_adapter",
]

[[tool.importlinter.contracts]]
name    = "BC-02: market_data no importa trading ni data_platform"
type    = "forbidden"
source_modules = ["market_data"]
forbidden_modules = ["trading", "data_platform"]

[[tool.importlinter.contracts]]
name    = "BC-03: signals isolated from execution"
type    = "forbidden"
source_modules = ["trading.strategies"]
forbidden_modules = ["trading.execution", "trading.analytics"]

[[tool.importlinter.contracts]]
name    = "BC-04: risk isolated from execution"
type    = "forbidden"
source_modules = ["trading.risk"]
forbidden_modules = ["trading.execution"]

[[tool.importlinter.contracts]]
name    = "BC-06: platform has no business logic dependencies"
type    = "forbidden"
source_modules = ["ocm_platform"]
forbidden_modules = ["market_data", "trading", "data_platform", "infra"]

[[tool.importlinter.contracts]]
name    = "BC-07: portfolio isolated from execution"
type    = "forbidden"
source_modules = ["portfolio"]
forbidden_modules = ["trading.execution", "trading.strategies"]

[[tool.importlinter.contracts]]
name    = "BC-08: api is a pure consumer"
type    = "forbidden"
source_modules = [
    "ocm_platform",
    "market_data",
    "trading",
    "data_platform",
    "domain",
    "app",
    "portfolio",
]
forbidden_modules = ["api"]
