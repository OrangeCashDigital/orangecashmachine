[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "orangecashmachine"
version = "0.1.0"
description = "Pipeline profesional de ingestión y procesamiento de datos de mercado para trading algorítmico"
requires-python = ">=3.11"
dependencies = [
    # Orquestación
    "prefect==2.19.5",
    "griffe==0.32.3",
    # Validación y tipado
    "pydantic==2.8.2",
    "pandera==0.19.3",
    # Procesamiento de datos
    "numpy<2.0",
    "pandas==2.2.2",
    "pyarrow==16.1.0",
    # Conectividad con exchanges
    "ccxt==4.3.58",
    # Logging y observabilidad
    "loguru==0.7.2",
    "prometheus-client>=0.20.0",
    # Configuración
    "pyyaml==6.0.2",
    "python-dotenv",
    # Resiliencia
    "pybreaker==1.4.1",
    "redis>=7.4.0",
    "pyiceberg[pyarrow,sql-sqlite]>=0.8.1",
    "duckdb>=1.5.1",
]

[project.scripts]
ocm = "main:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "mypy>=1.9",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
log_cli = true
log_cli_level = "DEBUG"

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
exclude = ["tests/", ".venv/"]

[tool.hatch.build.targets.wheel]
packages = [
    "core",
    "infra",
    "market_data",
    "data_platform",
    "trading",      # 🚧 stub — pendiente de market_data estable
    "backtesting",  # 🚧 stub — pendiente de GoldLoader validado
    # "research" excluido — exploratorio, no instalable
]
